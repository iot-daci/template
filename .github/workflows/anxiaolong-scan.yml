# 可复用 workflow：打包源码并调用安小龙 AI 代码审计，结果上传为 artifact。
# 业务仓通过 workflow_call 引用；须配置 AXL_* secrets。
name: Anxiaolong AI Code Audit

on:
  workflow_call:
    inputs:
      runner_type:
        description: "安小龙 runner 类型"
        type: string
        required: false
        default: "simple"
      enable_thinking:
        description: "是否开启 thinking"
        type: boolean
        required: false
        default: false
      source_name:
        description: "任务来源标识"
        type: string
        required: false
        default: "github-actions"
      artifact_name:
        description: "结果 artifact 名称"
        type: string
        required: false
        default: "anxiaolong-scan-results"
      artifact_retention_days:
        description: "结果 artifact 保留天数"
        type: number
        required: false
        default: 7
      timeout_minutes:
        description: "Job 超时（分钟）"
        type: number
        required: false
        default: 120
      max_package_mb:
        description: "源码包最大体积（MB）"
        type: string
        required: false
        default: "500"
      max_single_file_mb:
        description: "单个源文件最大体积（MB）"
        type: string
        required: false
        default: "50"
      max_result_files:
        description: "结果文件数量上限"
        type: string
        required: false
        default: "20"
      max_result_file_mb:
        description: "单个结果文件最大体积（MB）"
        type: string
        required: false
        default: "30"
      max_total_result_mb:
        description: "结果文件总大小上限（MB）"
        type: string
        required: false
        default: "100"
      allowed_result_extensions:
        description: "允许下载的结果文件扩展名（逗号分隔）"
        type: string
        required: false
        default: ".docx,.xlsx,.pdf,.txt,.json"
      user_input_prefix:
        description: "创建任务时的用户提示前缀"
        type: string
        required: false
        default: "请对上传的源代码压缩包进行AI代码安全审计，识别源代码漏洞、开源组件风险、敏感信息泄露等问题，并生成审计结果。"
    secrets:
      AXL_SERVER_URL:
        required: true
      AXL_API_KEY:
        required: true
      AXL_SKILL_ID:
        required: true
      AXL_ALLOWED_HOSTS:
        required: true
    outputs:
      task_id:
        description: "安小龙任务 ID"
        value: ${{ jobs.anxiaolong-scan.outputs.task_id }}
      task_status:
        description: "安小龙任务最终状态"
        value: ${{ jobs.anxiaolong-scan.outputs.task_status }}

permissions:
  contents: read

concurrency:
  group: anxiaolong-scan-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  anxiaolong-scan:
    name: Call Anxiaolong AI Code Audit
    runs-on: ubuntu-latest
    timeout-minutes: ${{ fromJSON(format('{0}', inputs.timeout_minutes)) }}
    outputs:
      task_id: ${{ steps.create_task.outputs.task_id }}
      task_status: ${{ steps.poll_task.outputs.task_status }}
    env:
      AXL_SERVER_URL: ${{ secrets.AXL_SERVER_URL }}
      AXL_API_KEY: ${{ secrets.AXL_API_KEY }}
      AXL_SKILL_ID: ${{ secrets.AXL_SKILL_ID }}
      AXL_ALLOWED_HOSTS: ${{ secrets.AXL_ALLOWED_HOSTS }}
      RUNNER_TYPE: ${{ inputs.runner_type }}
      ENABLE_THINKING: ${{ inputs.enable_thinking }}
      SOURCE_NAME: ${{ inputs.source_name }}
      MAX_PACKAGE_MB: ${{ inputs.max_package_mb }}
      MAX_SINGLE_FILE_MB: ${{ inputs.max_single_file_mb }}
      MAX_RESULT_FILES: ${{ inputs.max_result_files }}
      MAX_RESULT_FILE_MB: ${{ inputs.max_result_file_mb }}
      MAX_TOTAL_RESULT_MB: ${{ inputs.max_total_result_mb }}
      ALLOWED_RESULT_EXTENSIONS: ${{ inputs.allowed_result_extensions }}
      USER_INPUT_PREFIX: ${{ inputs.user_input_prefix }}
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Validate configuration and network policy
        run: |
          python3 - <<'PY'
          import os
          import ipaddress
          from urllib.parse import urlparse
          server_url = os.environ.get("AXL_SERVER_URL", "").strip().rstrip("/")
          api_key = os.environ.get("AXL_API_KEY", "").strip()
          skill_id = os.environ.get("AXL_SKILL_ID", "").strip()
          allowed_hosts_raw = os.environ.get("AXL_ALLOWED_HOSTS", "").strip()
          if api_key:
            print("::add-mask::" + api_key)
          if not server_url:
            raise RuntimeError("缺少 AXL_SERVER_URL，请在 GitHub Secrets 中配置")
          if not server_url.startswith("https://"):
            raise RuntimeError("AXL_SERVER_URL 必须使用 https://，生产环境不允许使用 http://")
          parsed = urlparse(server_url)
          if parsed.scheme != "https":
            raise RuntimeError("AXL_SERVER_URL 协议必须为 https")
          if not parsed.hostname:
            raise RuntimeError("AXL_SERVER_URL 缺少有效主机名")
          if parsed.username or parsed.password:
            raise RuntimeError("AXL_SERVER_URL 不允许包含用户名或密码")
          if parsed.path not in ("", "/"):
            raise RuntimeError("AXL_SERVER_URL 只允许填写基础地址，不允许包含接口路径")
          host = parsed.hostname.lower()
          if host in ("localhost", "127.0.0.1", "0.0.0.0"):
            raise RuntimeError("AXL_SERVER_URL 不允许指向本机地址")
          try:
            ip = ipaddress.ip_address(host)
            if ip.is_private or ip.is_loopback or ip.is_link_local or ip.is_multicast or ip.is_reserved:
              raise RuntimeError("AXL_SERVER_URL 不允许使用内网、本机、链路本地或保留 IP 地址")
          except ValueError:
            pass
          if not allowed_hosts_raw:
            raise RuntimeError("缺少 AXL_ALLOWED_HOSTS，请配置允许调用的安小龙域名白名单")
          allowed_hosts = [item.strip().lower() for item in allowed_hosts_raw.split(",") if item.strip()]
          if host not in allowed_hosts:
            raise RuntimeError("AXL_SERVER_URL 主机不在 AXL_ALLOWED_HOSTS 白名单内")
          if not api_key:
            raise RuntimeError("缺少 AXL_API_KEY，请在 GitHub Secrets 中配置")
          if len(api_key) < 16:
            raise RuntimeError("AXL_API_KEY 长度过短，请检查是否配置错误")
          if any(ch.isspace() for ch in api_key):
            raise RuntimeError("AXL_API_KEY 不允许包含空格、换行或制表符")
          try:
            skill_id_num = int(skill_id)
          except ValueError:
            raise RuntimeError("AXL_SKILL_ID 必须是数字类型，请检查 GitHub Secrets 配置")
          if skill_id_num <= 0:
            raise RuntimeError("AXL_SKILL_ID 必须是有效的技能 ID")
          print("配置与网络访问策略校验通过")
          print("AXL_SERVER_HOST:", host)
          print("AXL_SKILL_ID:", skill_id_num)
          PY

      - name: Package source code
        id: package
        run: |
          python3 - <<'PY'
          import os
          import zipfile
          import fnmatch
          from pathlib import Path
          zip_file = Path("/tmp/project-source.zip")
          if zip_file.exists():
            zip_file.unlink()
          max_package_mb = int(os.environ.get("MAX_PACKAGE_MB", "500"))
          max_single_file_mb = int(os.environ.get("MAX_SINGLE_FILE_MB", "50"))
          max_package_bytes = max_package_mb * 1024 * 1024
          max_single_file_bytes = max_single_file_mb * 1024 * 1024
          exclude_prefixes = [
            ".git/",
            ".github/",
            ".ssh/",
            ".aws/",
            ".azure/",
            ".gcp/",
            ".kube/",
            ".docker/",
            ".config/gcloud/",
            "node_modules/",
            "target/",
            "dist/",
            "build/",
            "coverage/",
            ".idea/",
            ".vscode/",
            ".gradle/",
            ".mvn/",
            ".venv/",
            "venv/",
            "__pycache__/",
            "anxiaolong-results/"
          ]
          exclude_names = [
            ".env",
            ".env.local",
            ".env.production",
            ".env.test",
            ".npmrc",
            ".pypirc",
            ".netrc",
            "id_rsa",
            "id_rsa.pub",
            "known_hosts",
            "authorized_keys",
            "credentials",
            "credentials.json",
            "service-account.json",
            "service_account.json",
            "gcloud.json",
            "kubeconfig",
            "config",
            "project-source.zip"
          ]
          exclude_patterns = [
            ".env.*",
            "*/.env",
            "*/.env.*",
            "*.pem",
            "*.key",
            "*.crt",
            "*.cer",
            "*.p12",
            "*.pfx",
            "*.jks",
            "*.keystore",
            "*.asc",
            "*.gpg",
            "*secret*",
            "*secrets*",
            "*credential*",
            "*credentials*",
            "*token*",
            "*apikey*",
            "*api-key*",
            "*private-key*",
            "*.sqlite",
            "*.sqlite3",
            "*.db",
            "*.log",
            "*.bak",
            "*.tmp",
            "*.zip",
            "*.tar",
            "*.tar.gz",
            "*.tgz",
            "*.rar",
            "*.7z",
            "*.gz",
            "*.png",
            "*.jpg",
            "*.jpeg",
            "*.gif",
            "*.bmp",
            "*.webp",
            "*.mp4",
            "*.mov",
            "*.avi",
            "*.pdf",
            "*.doc",
            "*.docx",
            "*.xls",
            "*.xlsx",
            "application-prod.yml",
            "application-prod.yaml",
            "application-production.yml",
            "application-production.yaml",
            "bootstrap-prod.yml",
            "bootstrap-prod.yaml"
          ]
          def should_exclude(relative_path, file_path):
            normalized = relative_path.replace("\\", "/")
            name = Path(normalized).name
            if file_path.is_symlink():
              return True
            if not file_path.is_file():
              return True
            for prefix in exclude_prefixes:
              if normalized.startswith(prefix):
                return True
            if name in exclude_names:
              return True
            for pattern in exclude_patterns:
              if fnmatch.fnmatch(normalized, pattern) or fnmatch.fnmatch(name, pattern):
                return True
            try:
              if file_path.stat().st_size > max_single_file_bytes:
                return True
            except OSError:
              return True
            return False
          print("开始打包源码")
          print("输出文件:", zip_file)
          file_count = 0
          skipped_count = 0
          with zipfile.ZipFile(zip_file, "w", zipfile.ZIP_DEFLATED) as zf:
            for root, dirs, files in os.walk("."):
              root_path = Path(root)
              for file_name in files:
                file_path = root_path / file_name
                relative_path = file_path.as_posix()
                if relative_path.startswith("./"):
                  relative_path = relative_path[2:]
                if should_exclude(relative_path, file_path):
                  skipped_count += 1
                  continue
                zf.write(file_path, relative_path)
                file_count += 1
          if not zip_file.exists() or zip_file.stat().st_size == 0:
            raise RuntimeError("源码压缩包为空，停止执行")
          package_size = zip_file.stat().st_size
          if package_size > max_package_bytes:
            raise RuntimeError(
              "源码压缩包超过限制，当前大小: "
              + str(package_size)
              + " bytes，限制: "
              + str(max_package_bytes)
              + " bytes"
            )
          print("源码打包完成")
          print("压缩包大小:", package_size)
          print("打包文件数量:", file_count)
          print("排除文件数量:", skipped_count)
          PY
          echo "zip_path=/tmp/project-source.zip" >> "$GITHUB_OUTPUT"

      - name: Upload source package to Anxiaolong
        id: upload
        env:
          ZIP_PATH: ${{ steps.package.outputs.zip_path }}
        run: |
          python3 - <<'PY'
          import os
          import ssl
          import json
          import uuid
          import mimetypes
          import urllib.request
          import urllib.error
          from pathlib import Path
          server_url = os.environ["AXL_SERVER_URL"].rstrip("/")
          api_key = os.environ["AXL_API_KEY"]
          zip_path = Path(os.environ["ZIP_PATH"])
          print("::add-mask::" + api_key)
          if not zip_path.exists():
            raise RuntimeError("源码压缩包不存在")
          ssl_context = ssl.create_default_context()
          ssl_context.minimum_version = ssl.TLSVersion.TLSv1_2
          def safe_error(prefix, error):
            if isinstance(error, urllib.error.HTTPError):
              raise RuntimeError(prefix + "，HTTP状态码: " + str(error.code))
            raise RuntimeError(prefix + "，请求失败")
          def validate_common_result(resp, operation):
            if not isinstance(resp, dict):
              raise RuntimeError(operation + "响应格式异常，期望 JSON 对象")
            if resp.get("code") != 200:
              msg = str(resp.get("message", "接口返回失败"))
              msg = msg.replace(api_key, "***")
              msg = msg[:200]
              raise RuntimeError(operation + "失败，code=" + str(resp.get("code")) + "，message=" + msg)
            return resp.get("data")
          def upload_file(url, file_path):
            boundary = "----AnxiaolongBoundary" + uuid.uuid4().hex
            file_name = file_path.name
            content_type = mimetypes.guess_type(file_name)[0] or "application/octet-stream"
            with open(file_path, "rb") as f:
              file_data = f.read()
            body = b""
            body += ("--" + boundary + "\r\n").encode("utf-8")
            body += (
              'Content-Disposition: form-data; name="file"; filename="' + file_name + '"\r\n'
            ).encode("utf-8")
            body += ("Content-Type: " + content_type + "\r\n\r\n").encode("utf-8")
            body += file_data
            body += b"\r\n"
            body += ("--" + boundary + "--\r\n").encode("utf-8")
            headers = {
              "X-API-Key": api_key,
              "Content-Type": "multipart/form-data; boundary=" + boundary
            }
            req = urllib.request.Request(
              url=url,
              data=body,
              headers=headers,
              method="POST"
            )
            try:
              with urllib.request.urlopen(req, context=ssl_context, timeout=300) as resp:
                text = resp.read(2 * 1024 * 1024).decode("utf-8", errors="replace")
                return json.loads(text)
            except urllib.error.HTTPError as e:
              safe_error("上传源码包失败", e)
            except Exception:
              safe_error("上传源码包失败", None)
          upload_url = server_url + "/dstaff/openapi/v1/task/file/upload"
          print("正在上传源码包到安小龙")
          upload_response = upload_file(upload_url, zip_path)
          upload_data = validate_common_result(upload_response, "文件上传")
          if not isinstance(upload_data, dict):
            raise RuntimeError("文件上传响应 data 结构异常")
          file_id = upload_data.get("fileId")
          file_name = upload_data.get("fileName") or zip_path.name
          if not isinstance(file_id, str) or not file_id.strip():
            raise RuntimeError("文件上传失败，未获取到有效 fileId")
          if not isinstance(file_name, str) or not file_name.strip():
            raise RuntimeError("文件上传失败，未获取到有效 fileName")
          print("源码包上传成功")
          print("fileName:", file_name)
          output_path = os.environ["GITHUB_OUTPUT"]
          with open(output_path, "a", encoding="utf-8") as f:
            f.write("file_id=" + file_id + "\n")
            f.write("file_name=" + file_name + "\n")
          PY

      - name: Create Anxiaolong scan task
        id: create_task
        env:
          FILE_ID: ${{ steps.upload.outputs.file_id }}
          FILE_NAME: ${{ steps.upload.outputs.file_name }}
        run: |
          python3 - <<'PY'
          import os
          import ssl
          import json
          import urllib.request
          import urllib.error
          server_url = os.environ["AXL_SERVER_URL"].rstrip("/")
          api_key = os.environ["AXL_API_KEY"]
          skill_id = int(os.environ["AXL_SKILL_ID"])
          file_id = os.environ["FILE_ID"]
          file_name = os.environ["FILE_NAME"]
          runner_type = os.environ.get("RUNNER_TYPE", "simple")
          enable_thinking = os.environ.get("ENABLE_THINKING", "false").lower() == "true"
          source_name = os.environ.get("SOURCE_NAME", "github-actions")
          user_input_prefix = os.environ.get(
            "USER_INPUT_PREFIX",
            "请对上传的源代码压缩包进行AI代码安全审计，"
            "识别源代码漏洞、开源组件风险、敏感信息泄露等问题，并生成审计结果。"
          )
          github_repo = os.environ.get("GITHUB_REPOSITORY", "unknown")
          github_ref = os.environ.get("GITHUB_REF_NAME", "unknown")
          github_sha = os.environ.get("GITHUB_SHA", "unknown")
          github_run_id = os.environ.get("GITHUB_RUN_ID", "unknown")
          github_actor = os.environ.get("GITHUB_ACTOR", "unknown")
          print("::add-mask::" + api_key)
          ssl_context = ssl.create_default_context()
          ssl_context.minimum_version = ssl.TLSVersion.TLSv1_2
          def request_json(method, url, headers=None, body=None, timeout=120):
            headers = headers or {}
            if body is not None:
              body = json.dumps(body, ensure_ascii=False).encode("utf-8")
              headers["Content-Type"] = "application/json"
            req = urllib.request.Request(
              url=url,
              data=body,
              headers=headers,
              method=method
            )
            try:
              with urllib.request.urlopen(req, context=ssl_context, timeout=timeout) as resp:
                text = resp.read(2 * 1024 * 1024).decode("utf-8", errors="replace")
                return json.loads(text)
            except urllib.error.HTTPError as e:
              raise RuntimeError("创建任务请求失败，HTTP状态码: " + str(e.code))
            except Exception:
              raise RuntimeError("创建任务请求失败")
          def validate_common_result(resp, operation):
            if not isinstance(resp, dict):
              raise RuntimeError(operation + "响应格式异常，期望 JSON 对象")
            if resp.get("code") != 200:
              msg = str(resp.get("message", "接口返回失败"))
              msg = msg.replace(api_key, "***")
              msg = msg[:200]
              raise RuntimeError(operation + "失败，code=" + str(resp.get("code")) + "，message=" + msg)
            return resp.get("data")
          user_input = (
            user_input_prefix
            + "来源：GitHub Actions，"
            + "仓库：" + github_repo + "，"
            + "分支：" + github_ref + "，"
            + "提交：" + github_sha + "，"
            + "执行ID：" + github_run_id + "，"
            + "触发人：" + github_actor + "。"
          )
          create_body = {
            "skillId": skill_id,
            "userInput": user_input,
            "files": [
              {
                "fileId": file_id,
                "fileName": file_name
              }
            ],
            "source": source_name,
            "runnerType": runner_type,
            "enableThinking": enable_thinking
          }
          create_url = server_url + "/dstaff/openapi/v1/task/create"
          print("正在创建安小龙扫描任务")
          print("仓库:", github_repo)
          print("分支:", github_ref)
          print("提交:", github_sha)
          create_response = request_json(
            "POST",
            create_url,
            headers={
              "X-API-Key": api_key
            },
            body=create_body
          )
          task_id = validate_common_result(create_response, "创建任务")
          if not isinstance(task_id, str) or not task_id.strip():
            raise RuntimeError("创建任务失败，未获取到有效 taskId")
          print("安小龙扫描任务创建成功")
          print("taskId:", task_id)
          output_path = os.environ["GITHUB_OUTPUT"]
          with open(output_path, "a", encoding="utf-8") as f:
            f.write("task_id=" + task_id + "\n")
          PY

      - name: Poll Anxiaolong task status
        id: poll_task
        env:
          TASK_ID: ${{ steps.create_task.outputs.task_id }}
        run: |
          python3 - <<'PY'
          import os
          import ssl
          import json
          import time
          import urllib.request
          import urllib.parse
          import urllib.error
          from pathlib import Path
          server_url = os.environ["AXL_SERVER_URL"].rstrip("/")
          api_key = os.environ["AXL_API_KEY"]
          task_id = os.environ["TASK_ID"]
          max_poll_count = 240
          poll_interval = 15
          valid_status = {
            "WAITING",
            "RUNNING",
            "FINISHED",
            "CANCEL",
            "FAILED",
            "TIMEOUT",
            "DELETED"
          }
          failure_status = {
            "CANCEL",
            "FAILED",
            "TIMEOUT",
            "DELETED"
          }
          print("::add-mask::" + api_key)
          ssl_context = ssl.create_default_context()
          ssl_context.minimum_version = ssl.TLSVersion.TLSv1_2
          def request_json(method, url, headers=None, timeout=120):
            headers = headers or {}
            req = urllib.request.Request(
              url=url,
              headers=headers,
              method=method
            )
            try:
              with urllib.request.urlopen(req, context=ssl_context, timeout=timeout) as resp:
                text = resp.read(2 * 1024 * 1024).decode("utf-8", errors="replace")
                return json.loads(text)
            except urllib.error.HTTPError as e:
              raise RuntimeError("查询任务状态失败，HTTP状态码: " + str(e.code))
            except Exception:
              raise RuntimeError("查询任务状态失败")
          def validate_common_result(resp, operation):
            if not isinstance(resp, dict):
              raise RuntimeError(operation + "响应格式异常，期望 JSON 对象")
            if resp.get("code") != 200:
              msg = str(resp.get("message", "接口返回失败"))
              msg = msg.replace(api_key, "***")
              msg = msg[:200]
              raise RuntimeError(operation + "失败，code=" + str(resp.get("code")) + "，message=" + msg)
            return resp.get("data")
          print("开始轮询安小龙任务状态")
          print("taskId:", task_id)
          final_task_data = None
          for i in range(1, max_poll_count + 1):
            query = urllib.parse.urlencode({
              "taskId": task_id
            })
            data_url = server_url + "/dstaff/openapi/v1/task/data?" + query
            task_data_response = request_json(
              "GET",
              data_url,
              headers={
                "X-API-Key": api_key
              }
            )
            data = validate_common_result(task_data_response, "查询任务状态")
            if not isinstance(data, dict):
              raise RuntimeError("任务数据响应 data 结构异常")
            task_status = data.get("taskStatus")
            if task_status not in valid_status:
              raise RuntimeError("任务状态值异常: " + str(task_status))
            print("第", i, "次查询任务状态:", task_status)
            if task_status == "FINISHED":
              result_files = data.get("resultFiles")
              if result_files is None:
                raise RuntimeError("任务完成但缺少 resultFiles 字段")
              if not isinstance(result_files, list):
                raise RuntimeError("resultFiles 字段结构异常")
              final_task_data = data
              break
            if task_status in failure_status:
              raise RuntimeError("安小龙任务异常结束: " + str(task_status))
            if i == max_poll_count:
              raise RuntimeError("任务超过最大轮询次数仍未完成")
            time.sleep(poll_interval)
          if not final_task_data:
            raise RuntimeError("任务状态异常，未获取到最终任务数据")
          task_data_file = Path("anxiaolong-task-data.json")
          with open(task_data_file, "w", encoding="utf-8") as f:
            json.dump(final_task_data, f, ensure_ascii=False, indent=2)
          print("安小龙任务执行完成")
          print("任务数据已保存:", task_data_file)
          output_path = os.environ["GITHUB_OUTPUT"]
          with open(output_path, "a", encoding="utf-8") as f:
            f.write("task_status=FINISHED\n")
          PY

      - name: Download Anxiaolong result files
        run: |
          python3 - <<'PY'
          import os
          import ssl
          import json
          import re
          import urllib.request
          import urllib.parse
          import urllib.error
          from pathlib import Path
          server_url = os.environ["AXL_SERVER_URL"].rstrip("/")
          api_key = os.environ["AXL_API_KEY"]
          max_result_files = int(os.environ.get("MAX_RESULT_FILES", "20"))
          max_result_file_mb = int(os.environ.get("MAX_RESULT_FILE_MB", "30"))
          max_total_result_mb = int(os.environ.get("MAX_TOTAL_RESULT_MB", "100"))
          max_result_file_bytes = max_result_file_mb * 1024 * 1024
          max_total_result_bytes = max_total_result_mb * 1024 * 1024
          allowed_exts = {
            item.strip().lower()
            for item in os.environ.get("ALLOWED_RESULT_EXTENSIONS", ".docx,.xlsx,.pdf,.txt,.json").split(",")
            if item.strip()
          }
          print("::add-mask::" + api_key)
          task_data_file = Path("anxiaolong-task-data.json")
          result_dir = Path("anxiaolong-results")
          result_dir.mkdir(parents=True, exist_ok=True)
          if not task_data_file.exists():
            raise RuntimeError("未找到任务数据文件")
          with open(task_data_file, "r", encoding="utf-8") as f:
            final_task_data = json.load(f)
          result_files = final_task_data.get("resultFiles") or []
          if not isinstance(result_files, list):
            raise RuntimeError("resultFiles 字段结构异常")
          if not result_files:
            raise RuntimeError("安小龙任务已完成，但未发现可下载的结果文件")
          if len(result_files) > max_result_files:
            raise RuntimeError("结果文件数量超过限制，当前数量: " + str(len(result_files)))
          ssl_context = ssl.create_default_context()
          ssl_context.minimum_version = ssl.TLSVersion.TLSv1_2
          def safe_filename(name):
            name = Path(str(name)).name
            name = re.sub(r"[^A-Za-z0-9._-]", "_", name)
            if not name:
              name = "result.bin"
            return name[:160]
          def unique_path(directory, file_name, file_id, index):
            base_name = safe_filename(file_name)
            suffix = Path(base_name).suffix.lower()
            stem = Path(base_name).stem[:80]
            short_id = safe_filename(file_id)[:16]
            if suffix:
              final_name = stem + "_" + str(index) + "_" + short_id + suffix
            else:
              final_name = stem + "_" + str(index) + "_" + short_id + ".bin"
            return directory / final_name
          print("开始下载安小龙结果文件")
          print("结果文件数量:", len(result_files))
          total_size = 0
          for index, item in enumerate(result_files, start=1):
            if not isinstance(item, dict):
              raise RuntimeError("resultFiles 中存在非对象结构")
            result_file_id = item.get("fileId")
            result_file_name = item.get("fileName") or ((result_file_id or "result") + ".bin")
            if not isinstance(result_file_id, str) or not result_file_id.strip():
              raise RuntimeError("结果文件缺少有效 fileId")
            if not isinstance(result_file_name, str) or not result_file_name.strip():
              raise RuntimeError("结果文件缺少有效 fileName")
            safe_name = safe_filename(result_file_name)
            ext = Path(safe_name).suffix.lower()
            if ext not in allowed_exts:
              raise RuntimeError("结果文件类型不在允许范围内: " + ext)
            output_file = unique_path(result_dir, safe_name, result_file_id, index)
            download_url = server_url + "/dstaff/openapi/v1/task/file/download?" + urllib.parse.urlencode({
              "fileId": result_file_id
            })
            req = urllib.request.Request(
              url=download_url,
              headers={
                "X-API-Key": api_key
              },
              method="GET"
            )
            print("正在下载结果文件:", safe_name)
            try:
              with urllib.request.urlopen(req, context=ssl_context, timeout=300) as resp:
                chunks = []
                downloaded = 0
                while True:
                  chunk = resp.read(1024 * 1024)
                  if not chunk:
                    break
                  downloaded += len(chunk)
                  total_size += len(chunk)
                  if downloaded > max_result_file_bytes:
                    raise RuntimeError("单个结果文件超过大小限制: " + safe_name)
                  if total_size > max_total_result_bytes:
                    raise RuntimeError("结果文件总大小超过限制")
                  chunks.append(chunk)
                content = b"".join(chunks)
            except urllib.error.HTTPError as e:
              raise RuntimeError("结果文件下载失败，HTTP状态码: " + str(e.code))
            except Exception as e:
              raise RuntimeError("结果文件下载失败: " + str(e)[:200])
            with open(output_file, "wb") as f:
              f.write(content)
            if output_file.stat().st_size == 0:
              raise RuntimeError("结果文件为空: " + str(output_file))
            print("已下载:", output_file, "大小:", output_file.stat().st_size)
          print("安小龙结果文件下载完成")
          print("结果文件总大小:", total_size)
          PY

      - name: Upload Anxiaolong result artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          path: anxiaolong-results/**
          if-no-files-found: error
          retention-days: ${{ fromJSON(format('{0}', inputs.artifact_retention_days)) }}
