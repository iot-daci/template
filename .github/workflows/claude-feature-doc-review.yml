# 可复用 workflow：feature-* 分支 push 且设计文档有变更时，由 Claude 审核需求/技术方案。
# caller 须声明 permissions: contents:write, pull-requests:write, issues:write, id-token:write
# （contents:write 用于无 PR 时发表 commit comment）
#
# 说明：claude-code-action@v1 不支持 push，因此使用 Claude Code CLI（headless）。
# post_inline_comments=true 且存在关联 PR 时，通过 GitHub PR review comment 在文档行上点评。
name: Claude Feature Doc Review

on:
  workflow_call:
    inputs:
      before_sha:
        description: "Push 前 SHA（github.event.before）"
        type: string
        required: true
      after_sha:
        description: "Push 后 SHA（github.sha）"
        type: string
        required: true
      branch:
        description: "分支名（github.ref_name）"
        type: string
        required: true
      docs_path:
        description: "设计文档目录（需求 PRD + 技术设计）"
        type: string
        required: false
        default: "dev-doc/docs"
      base_branch:
        description: "新建分支（before 为空）时的对比基线"
        type: string
        required: false
        default: "main"
      model:
        description: "Claude 模型 ID（须与 API/代理令牌权限一致）"
        type: string
        required: false
        default: "claude-sonnet-4-6"
      max_turns:
        description: "最大对话轮数"
        type: number
        required: false
        default: 50
      post_inline_comments:
        description: "有关联 PR 时，是否在文档对应行发 inline review comment"
        type: boolean
        required: false
        default: true
      require_doc_review_md:
        description: "是否要求仓库根目录存在 DOC_REVIEW.md"
        type: boolean
        required: false
        default: true
      extra_review_instructions:
        description: "追加审查说明（可选）"
        type: string
        required: false
        default: ""
      anthropic_custom_headers:
        description: "自定义请求头 JSON（ANTHROPIC_CUSTOM_HEADERS）"
        type: string
        required: false
        default: ""
    secrets:
      ANTHROPIC_API_KEY:
        required: true
      ANTHROPIC_BASE_URL:
        required: false

concurrency:
  group: claude-feature-doc-review-${{ inputs.branch }}
  cancel-in-progress: true

jobs:
  claude-doc-review:
    runs-on: ubuntu-latest
    env:
      CLAUDE_MODEL: ${{ inputs.model }}
      DOCS_PATH: ${{ inputs.docs_path }}
      BEFORE_SHA: ${{ inputs.before_sha }}
      AFTER_SHA: ${{ inputs.after_sha }}
      BRANCH: ${{ inputs.branch }}
      BASE_BRANCH: ${{ inputs.base_branch }}
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.after_sha }}

      - name: Fetch compare refs
        run: |
          set -euo pipefail
          git fetch --no-tags origin "+refs/heads/${BASE_BRANCH}:refs/remotes/origin/${BASE_BRANCH}" || true
          ZERO="0000000000000000000000000000000000000000"
          if [ -n "$BEFORE_SHA" ] && [ "$BEFORE_SHA" != "$ZERO" ]; then
            git fetch --no-tags origin "$BEFORE_SHA" || true
          fi

      - name: Resolve doc diff range
        id: range
        run: |
          set -euo pipefail
          ZERO="0000000000000000000000000000000000000000"
          if [ "$BEFORE_SHA" = "$ZERO" ] || [ -z "$BEFORE_SHA" ]; then
            if git rev-parse --verify "origin/${BASE_BRANCH}" >/dev/null 2>&1; then
              BASE=$(git merge-base "origin/${BASE_BRANCH}" "$AFTER_SHA")
            elif git rev-parse --verify "$BASE_BRANCH" >/dev/null 2>&1; then
              BASE=$(git merge-base "$BASE_BRANCH" "$AFTER_SHA")
            else
              if git rev-parse --verify "${AFTER_SHA}^" >/dev/null 2>&1; then
                BASE=$(git rev-parse "${AFTER_SHA}^")
              else
                BASE=$(git hash-object -t tree /dev/null)
              fi
            fi
            echo "compare_from=$BASE" >> "$GITHUB_OUTPUT"
            echo "新建分支或无 before，相对基线对比: $BASE"
          else
            echo "compare_from=$BEFORE_SHA" >> "$GITHUB_OUTPUT"
            echo "相对 before 对比: $BEFORE_SHA"
          fi

      - name: Detect changed docs
        id: docs
        run: |
          set -euo pipefail
          mkdir -p .github
          FROM="${{ steps.range.outputs.compare_from }}"
          git diff --name-only "$FROM" "$AFTER_SHA" -- "$DOCS_PATH" > .github/claude-doc-changed-files.txt || true
          if [ ! -s .github/claude-doc-changed-files.txt ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "本次 push 未变更 ${DOCS_PATH}，跳过审查"
            exit 0
          fi
          git diff "$FROM" "$AFTER_SHA" -- "$DOCS_PATH" > .github/claude-doc-diff.patch
          {
            echo "branch: $BRANCH"
            echo "before: $BEFORE_SHA"
            echo "after: $AFTER_SHA"
            echo "compare_from: $FROM"
            echo "docs_path: $DOCS_PATH"
            echo "changed_files:"
            sed 's/^/  - /' .github/claude-doc-changed-files.txt
          } > .github/claude-doc-meta.txt
          FILE_COUNT=$(wc -l < .github/claude-doc-changed-files.txt | tr -d ' ')
          DIFF_LINES=$(wc -l < .github/claude-doc-diff.patch | tr -d ' ')
          echo "has_changes=true" >> "$GITHUB_OUTPUT"
          echo "file_count=$FILE_COUNT" >> "$GITHUB_OUTPUT"
          echo "diff_lines=$DIFF_LINES" >> "$GITHUB_ENV"
          echo "变更文档 ${FILE_COUNT} 个，diff ${DIFF_LINES} 行"

      - name: Find open PR for branch
        if: steps.docs.outputs.has_changes == 'true'
        id: pr
        run: |
          set -euo pipefail
          PR_JSON=$(gh pr list --head "$BRANCH" --state open --json number,url,headRefOid --limit 1)
          PR_NUMBER=$(echo "$PR_JSON" | jq -r '.[0].number // empty')
          PR_URL=$(echo "$PR_JSON" | jq -r '.[0].url // empty')
          HEAD_OID=$(echo "$PR_JSON" | jq -r '.[0].headRefOid // empty')
          if [ -n "$PR_NUMBER" ]; then
            echo "has_pr=true" >> "$GITHUB_OUTPUT"
            echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
            echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"
            echo "head_sha=$HEAD_OID" >> "$GITHUB_OUTPUT"
            echo "关联 PR #$PR_NUMBER（head=$HEAD_OID）"
          else
            echo "has_pr=false" >> "$GITHUB_OUTPUT"
            echo "pr_number=" >> "$GITHUB_OUTPUT"
            echo "head_sha=" >> "$GITHUB_OUTPUT"
            echo "未找到关联 PR；无法发 inline 行评，结论改走 commit comment"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Resolve inline comments
        if: steps.docs.outputs.has_changes == 'true'
        id: inline
        run: |
          if [ "${{ inputs.post_inline_comments }}" = "true" ] && [ "${{ steps.pr.outputs.has_pr }}" = "true" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "将在 PR 文档行上发表 inline comment"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            if [ "${{ inputs.post_inline_comments }}" = "true" ]; then
              echo "::warning::post_inline_comments=true 但无关联 PR，已跳过行评"
            fi
          fi

      - name: Install inline comment helper
        if: steps.docs.outputs.has_changes == 'true' && steps.inline.outputs.enabled == 'true'
        env:
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
          HEAD_SHA: ${{ steps.pr.outputs.head_sha }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          python3 <<'PY'
          import os
          repo = os.environ["REPO"]
          pr = os.environ["PR_NUMBER"]
          sha = os.environ["HEAD_SHA"]
          # Avoid "${{" in workflow YAML (GHA expression syntax).
          d = chr(36)
          script = "\n".join([
              "#!/usr/bin/env bash",
              "set -euo pipefail",
              f'PATH_ARG="{d}{{1:?path required}}"',
              f'LINE_ARG="{d}{{2:?line required}}"',
              f'BODY_ARG="{d}{{3:--}}"',
              f'if [ "{d}BODY_ARG" = "-" ]; then',
              '  BODY="$(cat)"',
              "else",
              f'  BODY="{d}BODY_ARG"',
              "fi",
              f'if ! [[ "{d}LINE_ARG" =~ ^[0-9]+$ ]]; then',
              f'  echo "line must be a positive integer, got: {d}LINE_ARG" >&2',
              "  exit 1",
              "fi",
              f'gh api "repos/{repo}/pulls/{pr}/comments" \\',
              f'  -f body="{d}BODY" \\',
              f'  -f commit_id="{sha}" \\',
              f'  -f path="{d}PATH_ARG" \\',
              f'  -F line="{d}LINE_ARG" \\',
              '  -f side=RIGHT \\',
              "  >/dev/null",
              f'echo "posted inline: {d}PATH_ARG:{d}LINE_ARG"',
              "",
          ])
          path = ".github/claude-post-doc-inline.sh"
          with open(path, "w", encoding="utf-8") as f:
              f.write(script)
          os.chmod(path, 0o755)
          print(f"inline helper ready for PR #{pr}")
          PY
          bash -n .github/claude-post-doc-inline.sh

      - name: Configure Anthropic endpoint
        if: steps.docs.outputs.has_changes == 'true'
        run: |
          if [ -n "$ANTHROPIC_BASE_URL_INPUT" ]; then
            echo "ANTHROPIC_BASE_URL=$ANTHROPIC_BASE_URL_INPUT" >> "$GITHUB_ENV"
          fi
          if [ -n "$ANTHROPIC_CUSTOM_HEADERS_INPUT" ]; then
            echo "ANTHROPIC_CUSTOM_HEADERS=$ANTHROPIC_CUSTOM_HEADERS_INPUT" >> "$GITHUB_ENV"
          fi
        env:
          ANTHROPIC_BASE_URL_INPUT: ${{ secrets.ANTHROPIC_BASE_URL }}
          ANTHROPIC_CUSTOM_HEADERS_INPUT: ${{ inputs.anthropic_custom_headers }}

      - name: Check DOC_REVIEW.md
        if: steps.docs.outputs.has_changes == 'true'
        run: |
          if [ -f "DOC_REVIEW.md" ]; then
            echo "已找到 DOC_REVIEW.md"
          elif [ "${{ inputs.require_doc_review_md }}" = "true" ]; then
            echo "::error::缺少 DOC_REVIEW.md，请在项目根目录添加（可从 template 仓库复制）"
            exit 1
          else
            echo "::warning::未找到 DOC_REVIEW.md"
          fi
          [ -f "CLAUDE.md" ] && echo "已找到 CLAUDE.md" || echo "CLAUDE.md 可选，未找到"

      - name: Setup Node
        if: steps.docs.outputs.has_changes == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Claude Code CLI
        if: steps.docs.outputs.has_changes == 'true'
        run: npm install -g @anthropic-ai/claude-code

      - name: Prepare review prompt
        if: steps.docs.outputs.has_changes == 'true'
        env:
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
          HAS_PR: ${{ steps.pr.outputs.has_pr }}
          POST_INLINE: ${{ steps.inline.outputs.enabled }}
          EXTRA_INSTRUCTIONS: ${{ inputs.extra_review_instructions }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          python3 <<'PY'
          import os
          repo = os.environ["REPO"]
          branch = os.environ["BRANCH"]
          pr = os.environ.get("PR_NUMBER", "")
          has_pr = os.environ.get("HAS_PR", "")
          post_inline = os.environ.get("POST_INLINE", "")
          docs = os.environ["DOCS_PATH"]
          diff_lines = os.environ.get("diff_lines", "")
          after = os.environ["AFTER_SHA"]
          extra = os.environ.get("EXTRA_INSTRUCTIONS", "")
          prompt = f"""REPO: {repo}
          BRANCH: {branch}
          PR_NUMBER: {pr}
          HAS_PR: {has_pr}
          POST_INLINE_COMMENTS: {post_inline}
          DOCS_PATH: {docs}
          DIFF_LINES: {diff_lines}
          COMMIT_SHA: {after}

          本分支为 feature 开发分支。本次 push 更新了 `{docs}`（含需求 PRD 与技术设计）。
          请**自动审核需求文档与技术方案**，**少轮次完成**。

          必读一次：
          1. `.github/claude-doc-meta.txt`（变更文件清单）
          2. `.github/claude-doc-diff.patch`（本次文档 diff）
          3. 根目录 `DOC_REVIEW.md`（若有）
          4. 变更涉及的完整文档正文（按 meta 中路径 Read，不要扫全库）

          禁止：全库扫描、重复无效 gh 命令、写任何结果 JSON 文件。

          ## 审查重点
          - **需求（PRD）**：目标/范围/非目标、角色与流程、规则与约束、验收口径是否清晰完备
          - **技术方案**：与需求是否对齐、模块边界、数据模型、接口/状态机、异常与补偿、安全与审计是否到位
          - **交叉一致性**：需求与设计是否矛盾或遗漏；金融场景优先关注资金安全、幂等、权限、可追溯

          ## 输出
          1. 若 HAS_PR 为 true：用一条 `gh pr comment {pr}` 发表审查总结
          2. 若 HAS_PR 为 false：用 `gh api` 往当前 commit 发一条 commit comment（repos/{repo}/commits/{after}/comments）
          3. 总结首行格式：`Important: N，Nit: M`（无 Important 时写「无阻塞项」）
          4. 按 DOC_REVIEW.md 区分 Important / Nit；Nit 最多 5 条

          ## Inline 行评（仅当 POST_INLINE_COMMENTS 为 true）
          - 对需要调整的文档段落，在对应**文件行号**发 PR review comment（出现在 Files 视图该行旁）
          - 只评 Important；最多 8 条
          - 行号必须是文档当前正文的绝对行号（从 1 起，对应 Read 看到的行）
          - 每条正文以 `【Important】` 开头，说明问题与建议改法
          - 调用方式（优先）：
            `.github/claude-post-doc-inline.sh "<path>" <line> - <<'EOF'
            【Important】...
            EOF`
          - 若脚本失败，可退回：
            `gh api repos/{repo}/pulls/{pr}/comments -f body='...' -f commit_id='<PR head sha>' -f path='...' -F line=<n> -f side=RIGHT`

          {extra}
          """
          # Strip common leading indent from f-string lines (2 spaces per content line).
          cleaned = []
          for line in prompt.splitlines():
              if line.startswith("  "):
                  cleaned.append(line[2:])
              else:
                  cleaned.append(line)
          with open(".github/claude-doc-review-prompt.md", "w", encoding="utf-8") as f:
              f.write("\n".join(cleaned) + "\n")
          print("prompt prepared")
          PY

      - name: Claude feature doc review
        if: steps.docs.outputs.has_changes == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ github.token }}
          POST_INLINE: ${{ steps.inline.outputs.enabled }}
        run: |
          set -euo pipefail
          TOOLS='Bash(gh pr comment:*),Bash(gh api:*),Read'
          if [ "${POST_INLINE}" = "true" ]; then
            TOOLS="Bash(.github/claude-post-doc-inline.sh:*),${TOOLS}"
          fi
          claude -p "$(cat .github/claude-doc-review-prompt.md)" \
            --model "${CLAUDE_MODEL}" \
            --max-turns "${{ inputs.max_turns }}" \
            --allowedTools "${TOOLS}" \
            --permission-mode bypassPermissions

      - name: Summary
        if: always()
        run: |
          {
            echo "## Claude Feature Doc Review"
            echo ""
            echo "- Branch: \`${BRANCH}\`"
            echo "- Docs path: \`${DOCS_PATH}\`"
            if [ "${{ steps.docs.outputs.has_changes }}" != "true" ]; then
              echo "- 结果: 无文档变更，已跳过"
            else
              echo "- 变更文件数: ${{ steps.docs.outputs.file_count }}"
              echo "- Inline 行评: ${{ steps.inline.outputs.enabled }}"
              if [ "${{ steps.pr.outputs.has_pr }}" = "true" ]; then
                echo "- 审查结论: 见 PR [#${{ steps.pr.outputs.pr_number }}](${{ steps.pr.outputs.pr_url }}) 评论 / Files 行评"
              else
                echo "- 审查结论: 见本 commit 的 Commit Comment / 上方 Claude 输出"
              fi
            fi
          } >> "${GITHUB_STEP_SUMMARY}"
