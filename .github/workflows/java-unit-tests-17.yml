name: Java 17 unit tests

on:
  workflow_call:
    inputs:
      workdir:
        type: string
        required: false
        default: "."
      modules:
        description: 传给 Maven 的额外参数，例如 -pl xxx -am
        type: string
        required: false
        default: ""

concurrency:
  group: unit-tests-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    container:
      image: lzk90s/java-develop-env:maven3-openjdk17
      volumes:
        - /root/.m2:/root/.m2
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Get cache directory path
        id: mvn-cache-dir-path
        run: echo "dir=/root/.m2" >>$GITHUB_OUTPUT

      - name: Use cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.mvn-cache-dir-path.outputs.dir }}
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
            ${{ runner.os }}-m2-

      - name: Init builder env
        run: init_env.sh

      - name: Run unit tests with JaCoCo
        run: cd ${{ inputs.workdir }} && mvn -B clean test ${{ inputs.modules }}

      # 与 test 拆开：即使单测失败也会扫描；用完全限定坐标避免 BOM 等无父模块解析 prefix 失败
      - name: Run SpotBugs
        if: always() && !cancelled()
        run: |
          cd ${{ inputs.workdir }}
          mvn -B -DskipTests compile \
            com.github.spotbugs:spotbugs-maven-plugin:4.8.6.6:spotbugs \
            com.github.spotbugs:spotbugs-maven-plugin:4.8.6.6:check \
            ${{ inputs.modules }}

      - name: Upload JaCoCo reports
        if: always() && !cancelled()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-coverage-${{ github.run_id }}
          path: |
            ${{ inputs.workdir }}/**/target/site/jacoco/index.html
            ${{ inputs.workdir }}/**/target/site/jacoco/jacoco.xml
            ${{ inputs.workdir }}/**/target/site/jacoco/jacoco.csv
          if-no-files-found: warn
          retention-days: 7

      - name: Upload SpotBugs reports
        if: always() && !cancelled()
        uses: actions/upload-artifact@v4
        with:
          name: spotbugs-${{ github.run_id }}
          path: |
            ${{ inputs.workdir }}/**/target/spotbugsXml.xml
            ${{ inputs.workdir }}/**/target/spotbugs.xml
            ${{ inputs.workdir }}/**/target/site/spotbugs.html
          if-no-files-found: warn
          retention-days: 7

      - name: JaCoCo coverage summary
        if: always() && !cancelled()
        working-directory: ${{ inputs.workdir }}
        run: |
          python3 <<'PY'
          import csv
          import os
          from pathlib import Path

          nl = chr(10)
          summary = Path(os.environ["GITHUB_STEP_SUMMARY"])
          run_id = os.environ.get("GITHUB_RUN_ID", "")
          lines = [
              "## JaCoCo Coverage",
              "",
              "汇总报告见 Artifact `jacoco-coverage-%s`（各模块 `index.html` / `jacoco.xml` / `jacoco.csv`）。" % run_id,
              "",
          ]
          csv_files = sorted(Path(".").glob("**/target/site/jacoco/jacoco.csv"))
          if not csv_files:
              lines.append("_未找到 jacoco.csv（可能无测试模块或插件未生效）_")
          else:
              lines.extend([
                  "| Module | Instruction | Branch | Line |",
                  "| --- | ---: | ---: | ---: |",
              ])
              total = [0, 0, 0, 0, 0, 0]

              def pct(covered, missed):
                  denom = covered + missed
                  return "n/a" if denom == 0 else ("%.1f%%" % (100.0 * covered / denom))

              for csv_path in csv_files:
                  parts = csv_path.parts
                  try:
                      idx = parts.index("target")
                      module = parts[idx - 1] if idx > 0 else csv_path.parent.parent.parent.name
                  except ValueError:
                      module = str(csv_path)
                  i_m = i_c = b_m = b_c = l_m = l_c = 0
                  with csv_path.open(newline="", encoding="utf-8") as fh:
                      for row in csv.DictReader(fh):
                          i_m += int(row.get("INSTRUCTION_MISSED") or 0)
                          i_c += int(row.get("INSTRUCTION_COVERED") or 0)
                          b_m += int(row.get("BRANCH_MISSED") or 0)
                          b_c += int(row.get("BRANCH_COVERED") or 0)
                          l_m += int(row.get("LINE_MISSED") or 0)
                          l_c += int(row.get("LINE_COVERED") or 0)
                  lines.append("| `%s` | %s | %s | %s |" % (module, pct(i_c, i_m), pct(b_c, b_m), pct(l_c, l_m)))
                  total[0] += i_m
                  total[1] += i_c
                  total[2] += b_m
                  total[3] += b_c
                  total[4] += l_m
                  total[5] += l_c

              lines.append(
                  "| **TOTAL** | **%s** | **%s** | **%s** |"
                  % (pct(total[1], total[0]), pct(total[3], total[2]), pct(total[5], total[4]))
              )
          with summary.open("a", encoding="utf-8") as out:
              out.write(nl.join(lines) + nl)
          PY

      - name: SpotBugs summary
        if: always() && !cancelled()
        working-directory: ${{ inputs.workdir }}
        run: |
          python3 <<'PY'
          import os
          import xml.etree.ElementTree as ET
          from pathlib import Path

          nl = chr(10)
          summary = Path(os.environ["GITHUB_STEP_SUMMARY"])
          run_id = os.environ.get("GITHUB_RUN_ID", "")
          lines = [
              "## SpotBugs",
              "",
              "详情见 Artifact `spotbugs-%s`（`spotbugsXml.xml` / `spotbugs.html`）。" % run_id,
              "",
          ]
          xml_files = sorted({
              *Path(".").glob("**/target/spotbugsXml.xml"),
              *Path(".").glob("**/target/spotbugs.xml"),
          })
          if not xml_files:
              lines.append(
                  "_未找到 SpotBugs 报告。常见原因：业务仓 POM 未配置 spotbugs-maven-plugin；"
                  "或 Run SpotBugs 步骤未执行/失败且未产出 XML。_"
              )
          else:
              lines.extend(["| Module | Bugs (reported) |", "| --- | ---: |"])
              total_bugs = 0
              seen = set()
              for xml_path in xml_files:
                  # 同一模块优先用 spotbugsXml.xml
                  parts = xml_path.parts
                  try:
                      idx = parts.index("target")
                      module = parts[idx - 1] if idx > 0 else str(xml_path)
                  except ValueError:
                      module = str(xml_path)
                  key = str(xml_path.parent)
                  if key in seen:
                      continue
                  preferred = xml_path.parent / "spotbugsXml.xml"
                  use = preferred if preferred.exists() else xml_path
                  seen.add(key)
                  try:
                      root = ET.parse(use).getroot()
                      n = len(root.findall("BugInstance"))
                  except Exception:
                      n = 0
                  total_bugs += n
                  lines.append("| `%s` | %d |" % (module, n))
              lines.append("| **TOTAL** | **%d** |" % total_bugs)
          with summary.open("a", encoding="utf-8") as out:
              out.write(nl.join(lines) + nl)
          PY
