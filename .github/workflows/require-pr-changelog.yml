name: Require PR Changelog section

on:
  workflow_call:

jobs:
  check:
    name: PR Changelog
    runs-on: ubuntu-latest
    steps:
      - name: Require non-empty ## Changelog
        env:
          BODY: ${{ github.event.pull_request.body }}
        run: |
          set -euo pipefail

          if [ -z "${BODY:-}" ]; then
            echo "::error::PR body is empty. Add a ## Changelog section (see .github/pull_request_template.md)."
            exit 1
          fi

          # 必须有 ## Changelog / ## changelog 标题
          if ! printf '%s\n' "$BODY" | grep -qiE '^##[[:space:]]+changelog[[:space:]]*$'; then
            echo "::error::Missing '## Changelog' heading in PR description."
            echo "CI appends this section to changelog.md after merge to main."
            exit 1
          fi

          # 提取段落（到下一个 ## 或结束），去掉 HTML 注释与空白
          SECTION=$(printf '%s\n' "$BODY" | awk '
            BEGIN { ignore=1 }
            tolower($0) ~ /^##[ \t]+changelog[ \t]*$/ { ignore=0; next }
            /^##[ \t]/ && ignore==0 { exit }
            ignore==0 { print }
          ')

          CLEAN=$(printf '%s\n' "$SECTION" \
            | sed -E 's/<!--([^-]|-[^-]|--+[^->]|--+>)*-->//g' \
            | sed -E '/^[[:space:]]*$/d' \
            | sed -E 's/^[[:space:]]+//;s/[[:space:]]+$//')

          if [ -z "$CLEAN" ]; then
            echo "::error::## Changelog section is empty. Write release notes (or '无对外变更' / internal only)."
            exit 1
          fi

          # 仍是模板占位符
          if [ "$CLEAN" = "-" ] || [ "$CLEAN" = "- " ]; then
            echo "::error::## Changelog still has the template placeholder '-'. Replace it with real notes."
            exit 1
          fi

          echo "OK: ## Changelog present"
          echo "$CLEAN" | head -n 20
          {
            echo "## PR Changelog check"
            echo ""
            echo "Found non-empty \`## Changelog\` section."
          } >>"$GITHUB_STEP_SUMMARY"
