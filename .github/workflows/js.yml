name: build js

on:
  workflow_call:
    inputs:
      workdir:
        type: string
        required: false
        default: "."
      docker_context:
        type: string
        required: false
        default: "."
      docker_image:
        type: string
        required: true
      # Optional env for product build.sh (e.g. openapi-doc white-label BRAND=dajinniao)
      brand:
        type: string
        required: false
        default: ""
    secrets:
      DOCKER_USER:
        required: true
      DOCKER_PASSWORD:
        required: true
      NPM_AUTH_TOKEN:
        required: false
      GH_TOKEN:
        description: 写回 changelog.md（main 构建成功后必填）
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: lzk90s/js-develop-env:alpine
      volumes:
        - /root/.m2:/root/.m2
    env:
      REGISTRY: registry.cn-hangzhou.aliyuncs.com
      NPM_CONFIG_USERCONFIG: /root/.npmrc
      NPM_AUTH_TOKEN: ${{ secrets.NPM_AUTH_TOKEN }}
      NPM_REGISTRY: https://packages.aliyun.com/637eea4f126bcb821717c7ff/npm/npm-registry/
    steps:

      # 拉取代码
      - name: Checkout source
        uses: actions/checkout@v4
      
      # 记录构建开始时间
      - name: Record build start time
        run: echo "BUILD_START_TIME=$(date +%s)" >> $GITHUB_ENV

      # 登录docker
      - name: Login to aliyun docker registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 设置branch环境变量
      - name: Set env.BRANCH
        run: echo "BRANCH=$(echo $GITHUB_REF | cut -d'/' -f 3)" >> $GITHUB_ENV

      # 获取当前时间戳
      - name: Get timestamp
        id: timestamp
        run: |
          TIMESTAMP=$(date +'%Y%m%d%H%M%S')
          echo "Build timestamp: $TIMESTAMP"
          echo "TIMESTAMP=$TIMESTAMP" >> $GITHUB_ENV
          echo "value=$TIMESTAMP" >> "$GITHUB_OUTPUT"

      # docker meta
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/team-gs/${{ inputs.docker_image }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=${{ steps.timestamp.outputs.value }}

      # 设置qemu
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 设置docker buildx配置
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 获取缓存路径
      - name: Get cache directory path
        id: yarn-cache-dir-path
        run: echo "dir=$(yarn cache dir)" >>$GITHUB_OUTPUT

      # 挂载缓存
      - name: Use cache
        uses: actions/cache@v4
        id: yarn-cache # use this to check for `cache-hit` (`steps.yarn-cache.outputs.cache-hit != 'true'`)
        with:
          path: ${{ steps.yarn-cache-dir-path.outputs.dir }}
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      # 获取Node版本
      - name: Get Node version
        id: node-version
        run: |
          NODE_VERSION=$(node --version)
          echo "Node version: $NODE_VERSION"
          echo "NODE_VERSION=$NODE_VERSION" >> $GITHUB_ENV

      # 初始化 npm（优先 NPM_AUTH_TOKEN secret，否则用镜像内 /tmp/.e）
      - name: Init builder env
        run: init_env.sh

      - name: Configure npm registry auth
        run: |
          if [ -z "${NPM_AUTH_TOKEN}" ]; then
            echo "NPM_AUTH_TOKEN not set, skip npm auth configure"
            exit 0
          fi
          REGISTRY_HOST="${NPM_REGISTRY#https://}"
          REGISTRY_HOST="${REGISTRY_HOST%/}"
          printf '%s\n' \
            "registry=${NPM_REGISTRY}" \
            "always-auth=true" \
            "//${REGISTRY_HOST}/:_authToken=${NPM_AUTH_TOKEN}" \
            "cache=/root/.npm" \
            "strict-peer-dependencies=false" \
            "auto-install-peers=true" \
            > /root/.npmrc
          echo "Configured npm registry auth"

      # 编译包
      - name: Build package
        env:
          BRAND: ${{ inputs.brand }}
        run: cd ${{ inputs.workdir }} && sh build.sh

      # 编译docker镜像
      - name: Build and push docker
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.docker_context }}
          platforms: linux/amd64
          build-args: |
            BRAND=${{ inputs.brand }}
          cache-from: type=gha,scope=${{ inputs.docker_image }}
          cache-to: type=gha,mode=max,scope=${{ inputs.docker_image }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Summary
        if: always()
        env:
          DOCKER_TAGS: ${{ steps.meta.outputs.tags }}
          JOB_STATUS: ${{ job.status }}
        run: |
          BUILD_END_TIME=$(date +%s)
          BUILD_DURATION=$((BUILD_END_TIME - ${{ env.BUILD_START_TIME }}))
          BUILD_MINUTES=$((BUILD_DURATION / 60))
          BUILD_SECONDS=$((BUILD_DURATION % 60))

          if [ "$JOB_STATUS" = "success" ]; then
            echo "## 🎉 Build Summary" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "✅ Application built successfully!" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ❌ Build Summary" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "❌ Build failed!" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Build Info:**" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Ref: \`${{ github.ref }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Node Version: \`${{ env.NODE_VERSION }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Architecture: \`$(uname -m)\`" >> $GITHUB_STEP_SUMMARY
          echo "- Duration: \`${BUILD_MINUTES}m ${BUILD_SECONDS}s\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "$JOB_STATUS" = "success" ]; then
            echo "**Artifacts:**" >> $GITHUB_STEP_SUMMARY
            if [ -n "$DOCKER_TAGS" ]; then
              echo "$DOCKER_TAGS" | while read -r tag; do
                if [ -n "$tag" ]; then
                  echo "- Docker Image: \`$tag\`" >> $GITHUB_STEP_SUMMARY
                fi
              done
            fi
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "📦 Download artifacts from the Actions tab." >> $GITHUB_STEP_SUMMARY
          fi

    outputs:
      version: ${{ steps.timestamp.outputs.value }}

  changelog:
    name: Changelog
    needs: build
    if: ${{ success() && github.ref_name == 'main' }}
    uses: ./.github/workflows/append-changelog.yml
    with:
      service_name: ${{ inputs.docker_image }}
      image_version: ${{ needs.build.outputs.version }}
      registry_image: registry.cn-hangzhou.aliyuncs.com/team-gs/${{ inputs.docker_image }}
    secrets:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
