name: Append changelog after build

on:
  workflow_call:
    inputs:
      changelog_path:
        description: Changelog 文件路径（相对仓库根）
        type: string
        required: false
        default: "changelog.md"
      service_name:
        description: 服务名（通常为 docker_image）
        type: string
        required: true
      image_version:
        description: 镜像版本（build timestamp）
        type: string
        required: true
      registry_image:
        description: 完整镜像名（不含 tag），例如 registry.../team-gs/com.lz.vpay.server
        type: string
        required: false
        default: ""
      target_branch:
        description: 写入 changelog 的分支（仅 main 有意义）
        type: string
        required: false
        default: "main"
    secrets:
      GH_TOKEN:
        description: 用于 push changelog.md（必填）
        required: true

# 同一仓库同一分支上串行写 changelog，避免多服务同时构建互相抢 push
concurrency:
  group: append-changelog-${{ github.repository }}-${{ inputs.target_branch }}-${{ inputs.changelog_path }}
  cancel-in-progress: false

jobs:
  append:
    name: Append changelog
    runs-on: ubuntu-latest
    if: ${{ github.ref_name == inputs.target_branch }}
    steps:
      - name: Require GH_TOKEN
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          if [ -z "${GH_TOKEN}" ]; then
            echo "::error::GH_TOKEN is required to write changelog.md after Docker image build on main"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
          fetch-depth: 0
          ref: ${{ inputs.target_branch }}

      - name: Setup git
        run: |
          git config user.name "changelog-bot"
          git config user.email "changelog-bot@users.noreply.github.com"

      - name: Resolve PR and write changelog
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          CHANGELOG_PATH: ${{ inputs.changelog_path }}
          SERVICE_NAME: ${{ inputs.service_name }}
          IMAGE_VERSION: ${{ inputs.image_version }}
          REGISTRY_IMAGE: ${{ inputs.registry_image }}
          COMMIT_SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
          TARGET_BRANCH: ${{ inputs.target_branch }}
        run: |
          set -euo pipefail

          DATE_UTC=$(date -u +'%Y-%m-%d')
          SOURCE="commit"
          PR_NUMBER=""
          PR_TITLE=""
          PR_BODY=""
          PR_URL=""

          PR_JSON=$(gh api "repos/${REPO}/commits/${COMMIT_SHA}/pulls" \
            -H "Accept: application/vnd.github.groot-preview+json" 2>/dev/null || echo "[]")
          PR_COUNT=$(printf '%s' "$PR_JSON" | jq 'length')
          if [ "$PR_COUNT" -gt 0 ]; then
            PR_NUMBER=$(printf '%s' "$PR_JSON" | jq -r '.[0].number')
            PR_TITLE=$(printf '%s' "$PR_JSON" | jq -r '.[0].title // ""')
            PR_BODY=$(printf '%s' "$PR_JSON" | jq -r '.[0].body // ""')
            PR_URL=$(printf '%s' "$PR_JSON" | jq -r '.[0].html_url // ""')
            SOURCE="pr"
          else
            SEARCH_JSON=$(gh pr list --repo "$REPO" --state merged --search "$COMMIT_SHA" --limit 1 \
              --json number,title,body,url 2>/dev/null || echo "[]")
            if [ "$(printf '%s' "$SEARCH_JSON" | jq 'length')" -gt 0 ]; then
              PR_NUMBER=$(printf '%s' "$SEARCH_JSON" | jq -r '.[0].number')
              PR_TITLE=$(printf '%s' "$SEARCH_JSON" | jq -r '.[0].title // ""')
              PR_BODY=$(printf '%s' "$SEARCH_JSON" | jq -r '.[0].body // ""')
              PR_URL=$(printf '%s' "$SEARCH_JSON" | jq -r '.[0].url // ""')
              SOURCE="pr"
            fi
          fi

          ENTRY_FILE=$(mktemp)
          export DATE_UTC SOURCE PR_NUMBER PR_TITLE PR_BODY PR_URL ENTRY_FILE
          python3 <<'PY'
          import os
          import re
          from pathlib import Path


          def normalize(text: str) -> str:
              return text.replace("\r\n", "\n").replace("\r", "\n")


          def extract_changelog_section(body: str) -> str:
              lines = normalize(body).splitlines()
              collecting = False
              section: list[str] = []
              for line in lines:
                  if re.match(r"(?i)^##\s+changelog\s*$", line.strip()):
                      collecting = True
                      continue
                  if collecting and re.match(r"^##\s+", line.strip()):
                      break
                  if collecting:
                      section.append(line)
              text = "\n".join(section)
              text = re.sub(r"<!--.*?-->", "", text, flags=re.S)
              cleaned_lines: list[str] = []
              for ln in text.splitlines():
                  s = ln.strip()
                  if not s:
                      if cleaned_lines and cleaned_lines[-1] != "":
                          cleaned_lines.append("")
                      continue
                  # drop leftover template placeholder "-"
                  if re.fullmatch(r"-\s*", s):
                      continue
                  cleaned_lines.append(s)
              while cleaned_lines and cleaned_lines[-1] == "":
                  cleaned_lines.pop()
              return "\n".join(cleaned_lines).strip()


          def as_bullets(text: str) -> str:
              if not text:
                  return ""
              out: list[str] = []
              for ln in text.splitlines():
                  s = ln.strip()
                  if not s:
                      continue
                  if s.startswith(("- ", "* ", "+ ")):
                      out.append(f"- {s[2:].strip()}")
                  elif re.match(r"^\d+\.\s+", s):
                      out.append(f"- {re.sub(r'^\d+\.\s+', '', s)}")
                  else:
                      out.append(f"- {s}")
              return "\n".join(out)


          def tidy_pr_title(title: str) -> str:
              # "Feature foo" / "Fix: bar" → keep readable without shouting prefixes
              t = title.strip()
              t = re.sub(
                  r"^(feature|fix|hotfix|chore|docs|refactor)\s*[:：\-–—]?\s+",
                  "",
                  t,
                  flags=re.IGNORECASE,
              ).strip()
              return t or title.strip()


          service = os.environ["SERVICE_NAME"]
          version = os.environ["IMAGE_VERSION"]
          date_utc = os.environ["DATE_UTC"]
          pr_number = os.environ.get("PR_NUMBER") or ""
          pr_title = (os.environ.get("PR_TITLE") or "").strip()
          pr_body = os.environ.get("PR_BODY") or ""
          pr_url = (os.environ.get("PR_URL") or "").strip()
          registry = (os.environ.get("REGISTRY_IMAGE") or "").strip()
          commit_sha = os.environ.get("COMMIT_SHA") or ""
          entry_file = os.environ["ENTRY_FILE"]

          notes = extract_changelog_section(pr_body) if pr_body else ""
          if not notes:
              if pr_title:
                  notes = tidy_pr_title(pr_title)
                  print("::warning::No usable ## Changelog in PR body; falling back to PR title")
              elif commit_sha:
                  notes = f"构建提交 `{commit_sha[:7]}`（未关联 PR）"
                  print(f"::warning::No merged PR linked to {commit_sha}")
              else:
                  notes = "（无变更说明）"

          notes = as_bullets(notes)
          display_title = tidy_pr_title(pr_title) if pr_title else ""

          # Visual layout (heading includes tag for idempotent prepend):
          # ## date · service · tag
          # PR / commit
          # changes
          # collapsible image
          lines: list[str] = [
              f"## {date_utc} · `{service}` · `{version}`",
              "",
          ]

          if pr_number:
              label = f"#{pr_number}"
              if display_title:
                  label = f"#{pr_number} · {display_title}"
              if pr_url:
                  lines.append(f"**PR** [{label}]({pr_url})")
              else:
                  lines.append(f"**PR** {label}")
          elif commit_sha:
              lines.append(f"**Commit** `{commit_sha[:10]}`")

          lines.extend(["", notes, ""])

          if registry:
              lines.extend(
                  [
                      "<details>",
                      "<summary>Image</summary>",
                      "",
                      f"`{registry}:{version}`",
                      "",
                      "</details>",
                      "",
                  ]
              )

          lines.extend(["---", ""])
          entry = "\n".join(lines)
          Path(entry_file).write_text(entry, encoding="utf-8")
          print("Wrote changelog entry:")
          print(entry)
          PY

          {
            echo "## Changelog"
            echo ""
            echo "- Path: \`$CHANGELOG_PATH\`"
            echo "- Service: \`$SERVICE_NAME\`"
            echo "- Version: \`$IMAGE_VERSION\`"
            echo "- Source: \`$SOURCE\`"
            if [ -n "$PR_NUMBER" ]; then
              echo "- PR: #$PR_NUMBER"
            fi
          } >>"$GITHUB_STEP_SUMMARY"

          # 每次基于最新 remote 重新 prepend，避免并发 push / rebase 冲突
          MAX_ATTEMPTS=5
          for attempt in $(seq 1 "$MAX_ATTEMPTS"); do
            echo "Changelog push attempt ${attempt}/${MAX_ATTEMPTS}"

            git fetch origin "${TARGET_BRANCH}"
            git reset --hard "origin/${TARGET_BRANCH}"
            git clean -fd

            ENTRY_HEADER="## ${DATE_UTC} · \`${SERVICE_NAME}\` · \`${IMAGE_VERSION}\`"
            mkdir -p "$(dirname "$CHANGELOG_PATH")"
            if [ -f "$CHANGELOG_PATH" ] && grep -Fqx "$ENTRY_HEADER" "$CHANGELOG_PATH"; then
              echo "Entry already present (${ENTRY_HEADER}); skipping"
              exit 0
            fi

            if [ -f "$CHANGELOG_PATH" ]; then
              cat "$ENTRY_FILE" "$CHANGELOG_PATH" >"${CHANGELOG_PATH}.tmp"
              mv "${CHANGELOG_PATH}.tmp" "$CHANGELOG_PATH"
            else
              cp "$ENTRY_FILE" "$CHANGELOG_PATH"
            fi

            git add "$CHANGELOG_PATH"
            if git diff --cached --quiet; then
              echo "No changelog changes to commit"
              exit 0
            fi

            git commit -m "chore(changelog): ${SERVICE_NAME}@${IMAGE_VERSION}"

            if git push origin "HEAD:${TARGET_BRANCH}"; then
              echo "Changelog pushed successfully"
              exit 0
            fi

            echo "::warning::Push rejected (likely concurrent changelog update); retrying from latest ${TARGET_BRANCH}"
            sleep $((attempt * 2))
          done

          echo "::error::Failed to push changelog after ${MAX_ATTEMPTS} attempts"
          exit 1
