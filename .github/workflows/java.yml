name: build java exe

on:
  workflow_call:
    inputs:
      workdir:
        type: string
        required: false
        default: "."
      docker_context:
        type: string
        required: false
        default: "."
      docker_image:
        type: string
        required: true
      run_unit_tests:
        description: 打包前是否先跑单元测试；失败则不继续打包（默认关闭）
        type: boolean
        required: false
        default: false
    secrets:
      DOCKER_USER:
        required: true
      DOCKER_PASSWORD:
        required: true

jobs:
  unit-tests:
    name: Unit tests
    if: ${{ inputs.run_unit_tests }}
    runs-on: ubuntu-latest
    container:
      image: lzk90s/java-develop-env:maven3-openjdk11
      volumes:
        - /root/.m2:/root/.m2
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Get cache directory path
        id: mvn-cache-dir-path
        run: echo "dir=/root/.m2" >>$GITHUB_OUTPUT

      - name: Use cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.mvn-cache-dir-path.outputs.dir }}
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
            ${{ runner.os }}-m2-

      - name: Init builder env
        run: init_env.sh

      - name: Run unit tests, JaCoCo and SpotBugs
        run: cd ${{ inputs.workdir }} && mvn -B clean verify -DskipITs

      - name: Upload JaCoCo reports
        if: always() && !cancelled()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-coverage-${{ github.run_id }}
          # 只保留汇总文件，避免整棵 HTML 树撑爆 Artifact 存储
          path: |
            ${{ inputs.workdir }}/**/target/site/jacoco/index.html
            ${{ inputs.workdir }}/**/target/site/jacoco/jacoco.xml
            ${{ inputs.workdir }}/**/target/site/jacoco/jacoco.csv
          if-no-files-found: warn
          retention-days: 7

      - name: Coverage summary
        if: always() && !cancelled()
        working-directory: ${{ inputs.workdir }}
        run: |
          python3 <<'PY'
          import csv
          import os
          from pathlib import Path

          nl = chr(10)
          summary = Path(os.environ["GITHUB_STEP_SUMMARY"])
          run_id = os.environ.get("GITHUB_RUN_ID", "")
          lines = [
              "## JaCoCo Coverage",
              "",
              "汇总报告见 Artifact `jacoco-coverage-%s`（各模块 `index.html` / `jacoco.xml` / `jacoco.csv`）。" % run_id,
              "",
          ]
          csv_files = sorted(Path(".").glob("**/target/site/jacoco/jacoco.csv"))
          if not csv_files:
              lines.append("_未找到 jacoco.csv（可能无测试模块或插件未生效）_")
              summary.write_text(nl.join(lines) + nl, encoding="utf-8")
              raise SystemExit(0)

          lines.extend([
              "| Module | Instruction | Branch | Line |",
              "| --- | ---: | ---: | ---: |",
          ])
          total = [0, 0, 0, 0, 0, 0]

          def pct(covered, missed):
              denom = covered + missed
              return "n/a" if denom == 0 else ("%.1f%%" % (100.0 * covered / denom))

          for csv_path in csv_files:
              parts = csv_path.parts
              try:
                  idx = parts.index("target")
                  module = parts[idx - 1] if idx > 0 else csv_path.parent.parent.parent.name
              except ValueError:
                  module = str(csv_path)
              i_m = i_c = b_m = b_c = l_m = l_c = 0
              with csv_path.open(newline="", encoding="utf-8") as fh:
                  for row in csv.DictReader(fh):
                      i_m += int(row.get("INSTRUCTION_MISSED") or 0)
                      i_c += int(row.get("INSTRUCTION_COVERED") or 0)
                      b_m += int(row.get("BRANCH_MISSED") or 0)
                      b_c += int(row.get("BRANCH_COVERED") or 0)
                      l_m += int(row.get("LINE_MISSED") or 0)
                      l_c += int(row.get("LINE_COVERED") or 0)
              lines.append("| `%s` | %s | %s | %s |" % (module, pct(i_c, i_m), pct(b_c, b_m), pct(l_c, l_m)))
              total[0] += i_m
              total[1] += i_c
              total[2] += b_m
              total[3] += b_c
              total[4] += l_m
              total[5] += l_c

          lines.append(
              "| **TOTAL** | **%s** | **%s** | **%s** |"
              % (pct(total[1], total[0]), pct(total[3], total[2]), pct(total[5], total[4]))
          )
          with summary.open("a", encoding="utf-8") as out:
              out.write(nl.join(lines) + nl)
          PY

  build:
    name: Build & push
    needs: unit-tests
    # run_unit_tests=false 时 unit-tests 为 skipped，仍继续打包；测试失败则跳过打包
    if: ${{ always() && !cancelled() && (needs.unit-tests.result == 'success' || needs.unit-tests.result == 'skipped') }}
    runs-on: ubuntu-latest
    container:
      image: lzk90s/java-develop-env:maven3-openjdk11
      volumes:
        - /root/.m2:/root/.m2
    env:
      REGISTRY: registry.cn-hangzhou.aliyuncs.com
    steps:

      # 拉取代码
      - name: Checkout source
        uses: actions/checkout@v4

      # 记录构建开始时间
      - name: Record build start time
        run: echo "BUILD_START_TIME=$(date +%s)" >> $GITHUB_ENV

      # 登录docker
      - name: Login to aliyun docker registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 设置branch环境变量
      - name: Set env.BRANCH
        run: echo "BRANCH=$(echo $GITHUB_REF | cut -d'/' -f 3)" >> $GITHUB_ENV

      # 获取当前时间戳
      - name: Get timestamp
        id: timestamp
        run: |
          TIMESTAMP=$(date +'%Y%m%d%H%M%S')
          echo "Build timestamp: $TIMESTAMP"
          echo "TIMESTAMP=$TIMESTAMP" >> $GITHUB_ENV

      # docker meta
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/team-gs/${{ inputs.docker_image }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=${{ env.TIMESTAMP }}

      # 设置qemu
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64

      # 设置buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 获取缓存路径
      - name: Get cache directory path
        id: mvn-cache-dir-path
        run: echo "dir=/root/.m2" >>$GITHUB_OUTPUT

      # 挂载缓存
      - name: Use cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.mvn-cache-dir-path.outputs.dir }}
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
            ${{ runner.os }}-m2-

      # 初始化环境变量
      - name: Init builder env
        run: init_env.sh

      # 构建包
      - name: Build package
        run: cd ${{ inputs.workdir }} && mvn -Dmaven.test.skip=true -B package

      # 构建docker镜像
      - name: Build and push docker
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.docker_context }}
          platforms: linux/amd64
          cache-from: type=gha,scope=${{ inputs.docker_image }}
          cache-to: type=gha,mode=max,scope=${{ inputs.docker_image }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Summary
        if: always()
        env:
          DOCKER_TAGS: ${{ steps.meta.outputs.tags }}
          BUILD_VERSION: ${{ env.TIMESTAMP }}
          JOB_STATUS: ${{ job.status }}
        run: |
          BUILD_END_TIME=$(date +%s)
          BUILD_DURATION=$((BUILD_END_TIME - ${{ env.BUILD_START_TIME }}))
          BUILD_MINUTES=$((BUILD_DURATION / 60))
          BUILD_SECONDS=$((BUILD_DURATION % 60))

          if [ "$JOB_STATUS" = "success" ]; then
            echo "## 🎉 Build Summary" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "✅ Application built successfully!" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ❌ Build Summary" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "❌ Build failed!" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Build Info:**" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Ref: \`${{ github.ref }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Architecture: \`$(uname -m)\`" >> $GITHUB_STEP_SUMMARY
          echo "- Duration: \`${BUILD_MINUTES}m ${BUILD_SECONDS}s\`" >> $GITHUB_STEP_SUMMARY
          if [ -n "$BUILD_VERSION" ]; then
            echo "- Version: \`$BUILD_VERSION\`" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "$JOB_STATUS" = "success" ]; then
            echo "**Artifacts:**" >> $GITHUB_STEP_SUMMARY
            if [ -n "$DOCKER_TAGS" ]; then
              echo "$DOCKER_TAGS" | while read -r tag; do
                if [ -n "$tag" ]; then
                  echo "- Docker Image: \`$tag\`" >> $GITHUB_STEP_SUMMARY
                fi
              done
            fi
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "📦 Download artifacts from the Actions tab." >> $GITHUB_STEP_SUMMARY
          fi

    outputs:
      version: ${{ env.TIMESTAMP }}
