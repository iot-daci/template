name: Java 17 quality checks

on:
  workflow_call:
    inputs:
      workdir:
        type: string
        required: false
        default: "."
      modules:
        description: 传给 Maven 的额外参数，例如 -pl xxx -am
        type: string
        required: false
        default: ""
      ref:
        description: 要检测的 Git ref（分支/tag/SHA）；留空则用触发时的 ref
        type: string
        required: false
        default: ""
    secrets:
      NVD_API_KEY:
        description: 可选，OWASP Dependency-Check 访问 NVD API（加速、避免限流）
        required: false

concurrency:
  group: java-quality-${{ github.workflow }}-${{ inputs.ref || github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: ${{ inputs.ref != '' && format('Tests & analysis ({0})', inputs.ref) || 'Tests & static analysis' }}
    runs-on: ubuntu-latest
    container:
      image: lzk90s/java-develop-env:maven3-openjdk17
      volumes:
        - /root/.m2:/root/.m2
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref != '' && inputs.ref || github.sha }}

      - name: Resolve artifact label
        id: label
        run: |
          label="${{ inputs.ref }}"
          if [ -z "$label" ]; then
            label="${GITHUB_REF_NAME:-}"
            if [ -z "$label" ]; then
              label="$(printf '%s' "$GITHUB_SHA" | cut -c1-7)"
            fi
          fi
          # artifact 名不允许 /（POSIX：容器默认 sh 无 bash 的 ${var//pat/repl}）
          label="$(printf '%s' "$label" | tr '/' '-')"
          echo "value=$label" >>"$GITHUB_OUTPUT"

      - name: Get cache directory path
        id: mvn-cache-dir-path
        run: echo "dir=/root/.m2" >>$GITHUB_OUTPUT

      - name: Use Maven cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.mvn-cache-dir-path.outputs.dir }}
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
            ${{ runner.os }}-m2-

      # NVD 本地库在 ~/.m2/.../dependency-check-data（约数百 MB）。
      # 单独缓存：命中后只需增量更新，避免每次全量拉 30万+ 条。
      - name: Cache OWASP NVD data
        uses: actions/cache@v4
        with:
          path: /root/.m2/repository/org/owasp/dependency-check-data
          key: ${{ runner.os }}-owasp-nvd-12.2.2-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-owasp-nvd-12.2.2-
            ${{ runner.os }}-owasp-nvd-

      - name: Init builder env
        run: init_env.sh

      - name: Run unit tests with JaCoCo
        run: cd ${{ inputs.workdir }} && mvn -B clean test ${{ inputs.modules }}

      # SpotBugs + FindSecBugs（配置在各项目父 POM；默认 failOnError=false 只出报告）
      - name: SpotBugs + FindSecBugs
        if: always() && !cancelled()
        run: |
          cd ${{ inputs.workdir }}
          mvn -B -DskipTests compile spotbugs:spotbugs ${{ inputs.modules }}

      # 与 test 拆开：NVD 更新较慢；需在「调用方仓库」配置 secret NVD_API_KEY（不是 template 仓）
      - name: OWASP Dependency-Check
        if: always() && !cancelled()
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          cd ${{ inputs.workdir }}
          if [ -z "${NVD_API_KEY:-}" ]; then
            echo "::warning::NVD_API_KEY 未传入本 job。请在调用方仓库（如 vpay/vcard）Settings → Secrets 配置 NVD_API_KEY，并确保 workflow 使用 secrets: inherit 或显式传递。配在 template 仓无效。"
          else
            echo "NVD_API_KEY is set (length=${#NVD_API_KEY})"
          fi
          mvn -B -DskipTests \
            -DnvdApiKeyEnvironmentVariable=NVD_API_KEY \
            org.owasp:dependency-check-maven:12.2.2:check \
            ${{ inputs.modules }}

      - name: Upload JaCoCo reports
        if: always() && !cancelled()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-coverage-${{ steps.label.outputs.value }}-${{ github.run_id }}
          path: |
            ${{ inputs.workdir }}/**/target/site/jacoco/index.html
            ${{ inputs.workdir }}/**/target/site/jacoco/jacoco.xml
            ${{ inputs.workdir }}/**/target/site/jacoco/jacoco.csv
          if-no-files-found: warn
          retention-days: 7

      - name: Upload SpotBugs reports
        if: always() && !cancelled()
        uses: actions/upload-artifact@v4
        with:
          name: spotbugs-${{ steps.label.outputs.value }}-${{ github.run_id }}
          path: |
            ${{ inputs.workdir }}/**/target/spotbugsXml.xml
            ${{ inputs.workdir }}/**/target/spotbugs.xml
            ${{ inputs.workdir }}/**/target/site/spotbugs.html
          if-no-files-found: warn
          retention-days: 7

      - name: Upload OWASP Dependency-Check reports
        if: always() && !cancelled()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-${{ steps.label.outputs.value }}-${{ github.run_id }}
          path: |
            ${{ inputs.workdir }}/**/dependency-check-report.html
            ${{ inputs.workdir }}/**/dependency-check-report.json
            ${{ inputs.workdir }}/**/target/dependency-check-report.html
            ${{ inputs.workdir }}/**/target/dependency-check-report.json
          if-no-files-found: warn
          retention-days: 7

      - name: JaCoCo coverage summary
        if: always() && !cancelled()
        working-directory: ${{ inputs.workdir }}
        env:
          ARTIFACT_LABEL: ${{ steps.label.outputs.value }}
        run: |
          python3 <<'PY'
          import csv
          import os
          from pathlib import Path

          nl = chr(10)
          summary = Path(os.environ["GITHUB_STEP_SUMMARY"])
          run_id = os.environ.get("GITHUB_RUN_ID", "")
          label = os.environ.get("ARTIFACT_LABEL", "")
          artifact = "jacoco-coverage-%s-%s" % (label, run_id) if label else ("jacoco-coverage-%s" % run_id)
          lines = [
              "## JaCoCo Coverage",
              "",
              "汇总报告见 Artifact `%s`（各模块 `index.html` / `jacoco.xml` / `jacoco.csv`）。" % artifact,
              "",
          ]
          csv_files = sorted(Path(".").glob("**/target/site/jacoco/jacoco.csv"))
          if not csv_files:
              lines.append("_未找到 jacoco.csv（可能无测试模块或插件未生效）_")
          else:
              lines.extend([
                  "| Module | Instruction | Branch | Line |",
                  "| --- | ---: | ---: | ---: |",
              ])
              total = [0, 0, 0, 0, 0, 0]

              def pct(covered, missed):
                  denom = covered + missed
                  return "n/a" if denom == 0 else ("%.1f%%" % (100.0 * covered / denom))

              for csv_path in csv_files:
                  parts = csv_path.parts
                  try:
                      idx = parts.index("target")
                      module = parts[idx - 1] if idx > 0 else csv_path.parent.parent.parent.name
                  except ValueError:
                      module = str(csv_path)
                  i_m = i_c = b_m = b_c = l_m = l_c = 0
                  with csv_path.open(newline="", encoding="utf-8") as fh:
                      for row in csv.DictReader(fh):
                          i_m += int(row.get("INSTRUCTION_MISSED") or 0)
                          i_c += int(row.get("INSTRUCTION_COVERED") or 0)
                          b_m += int(row.get("BRANCH_MISSED") or 0)
                          b_c += int(row.get("BRANCH_COVERED") or 0)
                          l_m += int(row.get("LINE_MISSED") or 0)
                          l_c += int(row.get("LINE_COVERED") or 0)
                  lines.append("| `%s` | %s | %s | %s |" % (module, pct(i_c, i_m), pct(b_c, b_m), pct(l_c, l_m)))
                  total[0] += i_m
                  total[1] += i_c
                  total[2] += b_m
                  total[3] += b_c
                  total[4] += l_m
                  total[5] += l_c

              lines.append(
                  "| **TOTAL** | **%s** | **%s** | **%s** |"
                  % (pct(total[1], total[0]), pct(total[3], total[2]), pct(total[5], total[4]))
              )
          with summary.open("a", encoding="utf-8") as out:
              out.write(nl.join(lines) + nl)
          PY

      - name: SpotBugs summary
        if: always() && !cancelled()
        working-directory: ${{ inputs.workdir }}
        run: |
          python3 <<'PY'
          import os
          import xml.etree.ElementTree as ET
          from collections import Counter
          from pathlib import Path

          nl = chr(10)
          summary = Path(os.environ["GITHUB_STEP_SUMMARY"])
          run_id = os.environ.get("GITHUB_RUN_ID", "")
          lines = [
              "## SpotBugs + FindSecBugs",
              "",
              (
                  "详情见 Artifact `spotbugs-%s`（`spotbugsXml.xml` / `site/spotbugs.html`）。"
                  "默认 `spotbugs.failOnError=false`（只报告）；可用 `-Dspotbugs.failOnError=true` 门禁。"
              )
              % run_id,
              "",
          ]

          def module_name(path):
              parts = path.parts
              try:
                  idx = parts.index("target")
                  return parts[idx - 1] if idx > 0 else str(path)
              except ValueError:
                  return path.parent.name

          reports = []
          for pattern in ("**/target/spotbugsXml.xml", "**/target/spotbugs.xml"):
              reports.extend(Path(".").glob(pattern))
          # de-dupe preferring spotbugsXml.xml
          by_mod = {}
          for p in reports:
              key = (module_name(p), p.parent)
              if key not in by_mod or p.name == "spotbugsXml.xml":
                  by_mod[key] = p
          reports = sorted(by_mod.values(), key=lambda p: str(p))

          if not reports:
              lines.append("_未找到 SpotBugs XML（可能未配置插件、compile 失败或无 class）_")
          else:
              lines.extend([
                  "| Module | Bugs | High | Medium | Low | SECURITY | Top types |",
                  "| --- | ---: | ---: | ---: | ---: | ---: | --- |",
              ])
              total = Counter()
              type_total = Counter()
              for report in reports:
                  try:
                      root = ET.parse(report).getroot()
                  except Exception:
                      continue
                  bugs = list(root.findall("BugInstance"))
                  ranks = Counter()
                  sec = 0
                  types = Counter()
                  for b in bugs:
                      rank = (b.get("priority") or "").strip()
                      # SpotBugs priority: 1=High, 2=Medium, 3=Low
                      if rank == "1":
                          ranks["High"] += 1
                      elif rank == "2":
                          ranks["Medium"] += 1
                      else:
                          ranks["Low"] += 1
                      if (b.get("category") or "") == "SECURITY":
                          sec += 1
                      types[b.get("type") or "?"] += 1
                      type_total[b.get("type") or "?"] += 1
                  n = len(bugs)
                  total["n"] += n
                  total["High"] += ranks["High"]
                  total["Medium"] += ranks["Medium"]
                  total["Low"] += ranks["Low"]
                  total["SECURITY"] += sec
                  top = ", ".join("`%s`×%d" % (t, c) for t, c in types.most_common(3)) or "-"
                  lines.append(
                      "| `%s` | %d | %d | %d | %d | %d | %s |"
                      % (module_name(report), n, ranks["High"], ranks["Medium"], ranks["Low"], sec, top)
                  )
              lines.append(
                  "| **TOTAL** | **%d** | **%d** | **%d** | **%d** | **%d** |  |"
                  % (total["n"], total["High"], total["Medium"], total["Low"], total["SECURITY"])
              )
              if type_total:
                  lines.extend(["", "### Top bug types", "", "| Type | Count |", "| --- | ---: |"])
                  for t, c in type_total.most_common(20):
                      lines.append("| `%s` | %d |" % (t, c))
          with summary.open("a", encoding="utf-8") as out:
              out.write(nl.join(lines) + nl)
          PY

      - name: OWASP Dependency-Check summary
        if: always() && !cancelled()
        working-directory: ${{ inputs.workdir }}
        run: |
          python3 <<'PY'
          import json
          import os
          from collections import Counter
          from pathlib import Path

          nl = chr(10)
          summary = Path(os.environ["GITHUB_STEP_SUMMARY"])
          run_id = os.environ.get("GITHUB_RUN_ID", "")
          lines = [
              "## OWASP Dependency-Check",
              "",
              (
                  "详情见 Artifact `dependency-check-%s`（HTML/JSON）。默认 failBuildOnCVSS=11（只报告）；"
                  "可用 `-Ddependency-check.failBuildOnCVSS=7` 对 High+ 门禁。"
              )
              % run_id,
              "",
          ]

          def module_name(path):
              parts = path.parts
              try:
                  idx = parts.index("target")
                  return parts[idx - 1] if idx > 0 else str(path)
              except ValueError:
                  return path.parent.name

          def score_of(vuln):
              for key in ("cvssv3", "cvssV3", "cvssv2", "cvssV2"):
                  block = (vuln.get("severity") or {}).get(key) or vuln.get(key)
                  if isinstance(block, dict):
                      for sk in ("baseScore", "score"):
                          if block.get(sk) is not None:
                              try:
                                  return float(block[sk])
                              except (TypeError, ValueError):
                                  pass
              return None

          def severity_bucket(score):
              if score is None:
                  return "unknown"
              if score >= 9.0:
                  return "critical"
              if score >= 7.0:
                  return "high"
              if score >= 4.0:
                  return "medium"
              return "low"

          reports = sorted(set(Path(".").glob("**/dependency-check-report.json")))
          if not reports:
              lines.append("_未找到 dependency-check-report.json（扫描未执行、失败或插件未配置）_")
          else:
              lines.extend([
                  "| Module | Deps w/ CVE | Critical | High | Medium | Low |",
                  "| --- | ---: | ---: | ---: | ---: | ---: |",
              ])
              totals = Counter()
              top = Counter()
              for report in reports:
                  try:
                      data = json.loads(report.read_text(encoding="utf-8"))
                  except Exception:
                      continue
                  buckets = Counter()
                  deps_hit = 0
                  for dep in data.get("dependencies") or []:
                      vulns = dep.get("vulnerabilities") or []
                      if not vulns:
                          continue
                      deps_hit += 1
                      for v in vulns:
                          b = severity_bucket(score_of(v))
                          buckets[b] += 1
                          top[v.get("name") or "unknown"] += 1
                  lines.append(
                      "| `%s` | %d | %d | %d | %d | %d |"
                      % (
                          module_name(report),
                          deps_hit,
                          buckets["critical"],
                          buckets["high"],
                          buckets["medium"],
                          buckets["low"],
                      )
                  )
                  totals["deps"] += deps_hit
                  for k in ("critical", "high", "medium", "low"):
                      totals[k] += buckets[k]
              lines.append(
                  "| **TOTAL** | **%d** | **%d** | **%d** | **%d** | **%d** |"
                  % (totals["deps"], totals["critical"], totals["high"], totals["medium"], totals["low"])
              )
              if top:
                  lines.extend(["", "### Top CVEs", "", "| CVE | Count |", "| --- | ---: |"])
                  for name, c in top.most_common(15):
                      lines.append("| `%s` | %d |" % (name, c))
          with summary.open("a", encoding="utf-8") as out:
              out.write(nl.join(lines) + nl)
          PY
