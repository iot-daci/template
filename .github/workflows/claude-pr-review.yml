# 可复用 workflow：caller job 必须声明 permissions，例如：
#   permissions:
#     contents: read
#     pull-requests: write
#     issues: write
#     id-token: write
name: Claude PR Review

on:
  workflow_call:
    inputs:
      max_turns:
        description: "Claude Code 最大对话轮数（大型 PR 可调到 40～50）"
        type: number
        required: false
        default: 30
      track_progress:
        description: "是否在 PR 上显示审查进度评论（仅 pull_request 等事件有效；workflow_dispatch 会自动关闭）"
        type: boolean
        required: false
        default: true
      extra_review_instructions:
        description: "追加到审查 prompt 的额外说明（可选）"
        type: string
        required: false
        default: ""
      fail_on_blocking:
        description: "存在 blocking 问题时是否让 job 失败（用于分支保护）"
        type: boolean
        required: false
        default: true
      model:
        description: "Claude 模型 ID（须与 API/代理令牌权限一致；勿留空以免 action 默认 opus）"
        type: string
        required: false
        default: "claude-sonnet-4-6"
      use_code_review_plugin:
        description: "是否使用官方 code-review 插件（true 时忽略自定义审查 prompt）"
        type: boolean
        required: false
        default: false
      anthropic_custom_headers:
        description: '自定义请求头 JSON 字符串（留空不设置；对应 ANTHROPIC_CUSTOM_HEADERS）'
        type: string
        required: false
        default: ""
      load_template_guidelines:
        description: "是否从本模板库拉取 REVIEW.md / CLAUDE.md（业务仓库已有文件时优先用业务版本）"
        type: boolean
        required: false
        default: true
      template_repository:
        description: "模板库 owner/repo（留空则从 uses 的 workflow_ref 自动解析）"
        type: string
        required: false
        default: ""
      template_ref:
        description: "模板库 git ref（留空则使用 uses 引用的 ref，如 refs/heads/main）"
        type: string
        required: false
        default: ""
      pr_number:
        description: "PR 编号；pull_request 事件可留空，workflow_dispatch 手动触发时必填"
        type: string
        required: false
        default: ""
    secrets:
      ANTHROPIC_API_KEY:
        required: true
      ANTHROPIC_BASE_URL:
        required: false

concurrency:
  group: claude-pr-review-${{ github.event.pull_request.number || inputs.pr_number || github.run_id }}
  cancel-in-progress: true

jobs:
  claude-review:
    runs-on: ubuntu-latest
    env:
      # track_progress 仅支持 pull_request 等事件，手动 workflow_dispatch 必须关闭
      TRACK_PROGRESS_ENABLED: ${{ inputs.track_progress && github.event_name == 'pull_request' }}
      CLAUDE_MODEL: ${{ inputs.model }}
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Resolve pull request
        id: pr
        run: |
          if [ -n "${{ github.event.pull_request.number }}" ]; then
            PR_NUM="${{ github.event.pull_request.number }}"
          elif [ -n "${{ inputs.pr_number }}" ]; then
            PR_NUM="${{ inputs.pr_number }}"
          else
            echo "::error::需要 pull_request 事件，或在 workflow_dispatch 时传入 inputs.pr_number"
            exit 1
          fi
          echo "number=$PR_NUM" >> "$GITHUB_OUTPUT"
          echo "PR_NUMBER=$PR_NUM" >> "$GITHUB_ENV"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout PR branch
        run: gh pr checkout "$PR_NUMBER"
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}

      - name: Configure Anthropic endpoint
        run: |
          if [ -n "$ANTHROPIC_BASE_URL_INPUT" ]; then
            echo "ANTHROPIC_BASE_URL=$ANTHROPIC_BASE_URL_INPUT" >> "$GITHUB_ENV"
          fi
          if [ -n "$ANTHROPIC_CUSTOM_HEADERS_INPUT" ]; then
            echo "ANTHROPIC_CUSTOM_HEADERS=$ANTHROPIC_CUSTOM_HEADERS_INPUT" >> "$GITHUB_ENV"
          fi
        env:
          ANTHROPIC_BASE_URL_INPUT: ${{ secrets.ANTHROPIC_BASE_URL }}
          ANTHROPIC_CUSTOM_HEADERS_INPUT: ${{ inputs.anthropic_custom_headers }}

      - name: Resolve template repository
        id: template
        if: inputs.load_template_guidelines
        run: |
          WF_REF="${{ github.workflow_ref }}"
          if [ -n "${{ inputs.template_repository }}" ]; then
            REPO="${{ inputs.template_repository }}"
          else
            REPO="${WF_REF%%/.github/*}"
          fi
          if [ -z "$REPO" ] || { [ -z "${{ inputs.template_repository }}" ] && [ "$REPO" = "$WF_REF" ]; }; then
            echo "::warning::无法解析模板库地址，跳过注入 REVIEW.md/CLAUDE.md"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -n "${{ inputs.template_ref }}" ]; then
            REF="${{ inputs.template_ref }}"
          elif [[ "$WF_REF" == *@* ]]; then
            REF="${WF_REF#*@}"
          else
            REF="main"
          fi
          echo "repository=$REPO" >> "$GITHUB_OUTPUT"
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "Template guidelines: $REPO@$REF"

      - name: Fetch template REVIEW.md and CLAUDE.md
        if: inputs.load_template_guidelines && steps.template.outputs.skip != 'true'
        run: |
          mkdir -p _claude-template-guidelines
          REPO="${{ steps.template.outputs.repository }}"
          REF="${{ steps.template.outputs.ref }}"
          REF_PATH="${REF#refs/heads/}"
          REF_PATH="${REF_PATH#refs/tags/}"

          fetch_file() {
            local file="$1"
            local dest="_claude-template-guidelines/${file}"
            local raw_url="https://raw.githubusercontent.com/${REPO}/${REF_PATH}/${file}"

            echo "拉取 ${file} ← ${raw_url}"
            if curl -fsSL "${raw_url}" -o "${dest}" && [ -s "${dest}" ]; then
              echo "已从 raw 拉取: ${file}"
              return 0
            fi
            echo "raw 失败，尝试 GitHub API: repos/${REPO}/contents/${file}?ref=${REF}"
            if gh api -H "Accept: application/vnd.github.raw" \
              "repos/${REPO}/contents/${file}?ref=${REF}" > "${dest}" 2>/dev/null && [ -s "${dest}" ]; then
              echo "已从 GitHub API 拉取: ${file}"
              return 0
            fi
            rm -f "${dest}"
            return 1
          }

          MISSING=""
          for f in REVIEW.md CLAUDE.md; do
            fetch_file "$f" || MISSING="${MISSING} ${f}"
          done
          if [ -n "${MISSING}" ]; then
            echo "::error::未能从模板库 ${REPO}@${REF} 拉取:${MISSING}"
            echo "::error::公开库请确认：① REVIEW.md/CLAUDE.md 已推到该 ref ② uses 的 @ref 与文件分支一致（如 @main）"
            echo "可手动验证: https://raw.githubusercontent.com/${REPO}/${REF_PATH}/REVIEW.md"
            exit 1
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Apply review guidelines
        if: inputs.load_template_guidelines
        run: |
          for f in REVIEW.md CLAUDE.md; do
            if [ -f "$f" ]; then
              echo "使用业务仓库: $f"
            elif [ -f "_claude-template-guidelines/$f" ]; then
              cp "_claude-template-guidelines/$f" "$f"
              echo "使用模板库: $f"
            else
              echo "::error::未找到 $f"
              exit 1
            fi
          done

      - name: Claude code review (plugin)
        if: inputs.use_code_review_plugin
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          track_progress: ${{ env.TRACK_PROGRESS_ENABLED }}
          plugin_marketplaces: "https://github.com/anthropics/claude-code.git"
          plugins: "code-review@claude-code-plugins"
          prompt: "/code-review:code-review ${{ github.repository }}/pull/${{ env.PR_NUMBER }}"
          claude_args: |
            --model ${{ env.CLAUDE_MODEL }}
            --max-turns ${{ inputs.max_turns }}
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"

      - name: Claude code review
        if: ${{ !inputs.use_code_review_plugin }}
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          track_progress: ${{ env.TRACK_PROGRESS_ENABLED }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ env.PR_NUMBER }}

            请审查本 Pull Request。本项目为金融业务，安全与资金正确性要求极高。

            必须先阅读工作区根目录的 REVIEW.md（审查专用，优先级最高），其次参考 CLAUDE.md。
            （默认由模板库注入；若业务仓库自有同名文件则已覆盖为业务版本。）
            关注：资金/账务正确性、鉴权与越权、敏感数据、注入与 SSRF、审计追溯、幂等与并发。

            PR 分支已在当前工作目录 checkout。

            效率要求（避免超过 max_turns）：
            - 用 `gh pr diff` / `gh pr view` 聚焦本 PR 变更，不要全仓库扫描
            - REVIEW.md、CLAUDE.md 各 Read 一次即可
            - Important 问题优先；Nit 最多 5 条（与 REVIEW.md 一致）
            - 完成审查后尽快 Write 结果 JSON，不要重复调用同一工具

            用 inline comment 标注 Important 的具体代码问题，用 `gh pr comment` 写总结。

            审查结束后，必须用 Write 工具创建文件：
            `.github/claude-review-result.json`

            文件格式（严格遵守，仅 JSON，无 markdown 包裹）：
            {
              "status": "pass",
              "blocking_issues": 0,
              "summary": "Important: 0，Nit: 0。无阻塞项。"
            }

            规则（与 REVIEW.md 一致）：
            - status 只能是 "pass" 或 "fail"
            - 任一 REVIEW.md 定义的 Important 问题 → status 为 "fail"，blocking_issues 为 Important 条数
            - 仅有 Nit → status 为 "pass"，blocking_issues 为 0
            - summary 首句须包含 Important / Nit 数量

            ${{ inputs.extra_review_instructions }}
          claude_args: |
            --model ${{ env.CLAUDE_MODEL }}
            --max-turns ${{ inputs.max_turns }}
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Write"

      - name: Enforce review gate
        if: inputs.fail_on_blocking && !inputs.use_code_review_plugin
        run: |
          RESULT_FILE=".github/claude-review-result.json"
          if [ ! -f "$RESULT_FILE" ]; then
            echo "::error::Claude 未生成审查结果文件，视为未通过"
            exit 1
          fi
          STATUS=$(jq -r '.status' "$RESULT_FILE")
          BLOCKING=$(jq -r '.blocking_issues // 0' "$RESULT_FILE")
          SUMMARY=$(jq -r '.summary // ""' "$RESULT_FILE")
          echo "status=$STATUS, blocking_issues=$BLOCKING"
          echo "summary=$SUMMARY"
          jq . "$RESULT_FILE"
          if [ "$STATUS" != "pass" ] || [ "$BLOCKING" -gt 0 ]; then
            echo "::error::Claude review 未通过，请修复 blocking 问题后再合并"
            exit 1
          fi
          echo "Claude review passed"

      - name: Enforce review gate (plugin mode)
        if: inputs.fail_on_blocking && inputs.use_code_review_plugin
        run: |
          echo "::warning::plugin 模式未写入 claude-review-result.json，仅检查 workflow 是否成功完成"
          echo "若需严格合并门槛，请使用默认自定义 prompt 模式（use_code_review_plugin: false）"

      - name: Summary
        if: always()
        run: |
          echo "## Claude PR Review" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f ".github/claude-review-result.json" ]; then
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat .github/claude-review-result.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "审查已完成（plugin 模式或未生成结果 JSON）。" >> $GITHUB_STEP_SUMMARY
          fi
