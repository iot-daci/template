name: Code quality checks

on:
  workflow_call:
    inputs:
      kind:
        description: >
          检测类别。当前仅实现 server（Java 单测+SpotBugs）；
          后续可扩展 frontend / portal / docs 等
        type: string
        required: true
      workdir:
        description: 工程根目录
        type: string
        required: false
        default: "."
      modules:
        description: server 专用 — 传给 Maven 的额外参数，例如 -pl xxx -am
        type: string
        required: false
        default: ""
      ref:
        description: 要检测的 Git ref；留空则用触发时的 SHA
        type: string
        required: false
        default: ""

concurrency:
  group: code-quality-${{ inputs.kind }}-${{ github.workflow }}-${{ inputs.ref || github.ref }}-${{ inputs.workdir }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate kind
    runs-on: ubuntu-latest
    steps:
      - name: Check kind
        run: |
          kind="${{ inputs.kind }}"
          case "$kind" in
            server)
              echo "kind=$kind"
              ;;
            frontend|portal|docs)
              echo "kind='$kind' is reserved but not implemented yet (Java-only for now)"
              exit 1
              ;;
            *)
              echo "Unsupported kind='$kind'. Currently supported: server"
              exit 1
              ;;
          esac

  # ── server：Java 单测 + SpotBugs（并行；步骤在 actions 里）──

  unit-tests:
    if: inputs.kind == 'server'
    needs: validate
    name: ${{ inputs.ref != '' && format('Unit tests ({0})', inputs.ref) || 'Unit tests' }}
    runs-on: ubuntu-latest
    container:
      image: lzk90s/java-develop-env:maven3-openjdk17
      volumes:
        - /root/.m2:/root/.m2
    steps:
      # 必须写 owner/repo@ref：caller 仓没有这些 action，相对路径会落到 vcard/vpay 工作区
      - uses: iot-daci/template/.github/actions/java-unit-test@main
        with:
          workdir: ${{ inputs.workdir }}
          modules: ${{ inputs.modules }}
          checkout_ref: ${{ inputs.ref != '' && inputs.ref || github.sha }}
          ref_label: ${{ inputs.ref }}

  # SpotBugs：临时关闭；需要时把 if 改回 inputs.kind == 'server'
  spotbugs:
    if: false
    needs: validate
    name: ${{ inputs.ref != '' && format('SpotBugs ({0})', inputs.ref) || 'SpotBugs' }}
    runs-on: ubuntu-latest
    container:
      image: lzk90s/java-develop-env:maven3-openjdk17
      volumes:
        - /root/.m2:/root/.m2
    steps:
      - uses: iot-daci/template/.github/actions/java-spotbugs@main
        with:
          workdir: ${{ inputs.workdir }}
          modules: ${{ inputs.modules }}
          checkout_ref: ${{ inputs.ref != '' && inputs.ref || github.sha }}
          ref_label: ${{ inputs.ref }}
