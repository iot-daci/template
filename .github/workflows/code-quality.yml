name: Code quality checks

on:
  workflow_call:
    inputs:
      kind:
        description: >
          检测类别：server（Java 单测+SpotBugs）|
          frontend / portal（Node 前端）|
          docs（文档）
        type: string
        required: true
      workdir:
        description: 工程根目录
        type: string
        required: false
        default: "."
      modules:
        description: server 专用 — 传给 Maven 的额外参数，例如 -pl xxx -am
        type: string
        required: false
        default: ""
      install_command:
        description: >
          frontend/docs 专用 — 安装依赖命令（相对 workdir）。
          留空则按 package_manager 自动选择
          （pnpm→frozen-lockfile / npm→npm ci / none→true）
        type: string
        required: false
        default: ""
      quality_command:
        description: frontend/docs 专用 — 质量检查命令（相对 workdir）
        type: string
        required: false
        default: ""
      node_version:
        description: frontend/docs 专用 — Node 版本（setup-node）；portal-next engines 支持 22.18 / 24
        type: string
        required: false
        default: "24"
      package_manager:
        description: frontend/docs 专用 — npm | pnpm | none；留空则 frontend/portal→pnpm、docs→npm
        type: string
        required: false
        default: ""
      pnpm_version:
        description: pnpm 版本；留空则尝试读 workdir/package.json 的 packageManager
        type: string
        required: false
        default: ""
      enable_cache:
        description: frontend 专用 — 是否用 lockfile 做依赖缓存（无 lockfile 时设 false）
        type: boolean
        required: false
        default: true
      registry_url:
        type: string
        required: false
        default: "https://packages.aliyun.com/637eea4f126bcb821717c7ff/npm/npm-registry/"
      ref:
        description: 要检测的 Git ref；留空则用触发时的 SHA
        type: string
        required: false
        default: ""
    secrets:
      NPM_AUTH_TOKEN:
        description: 私服 npm token（frontend/docs 装私服包时需要）
        required: false

concurrency:
  group: code-quality-${{ inputs.kind }}-${{ github.workflow }}-${{ inputs.ref || github.ref }}-${{ inputs.workdir }}
  cancel-in-progress: true

env:
  WORKDIR: ${{ inputs.workdir }}
  MODULES: ${{ inputs.modules }}
  CHECKOUT_REF: ${{ inputs.ref != '' && inputs.ref || github.sha }}
  KIND: ${{ inputs.kind }}

jobs:
  validate:
    name: Validate kind
    runs-on: ubuntu-latest
    steps:
      - name: Check kind
        env:
          QUALITY_CMD: ${{ inputs.quality_command }}
        run: |
          kind="${{ inputs.kind }}"
          case "$kind" in
            server|frontend|portal|docs)
              echo "kind=$kind"
              ;;
            *)
              echo "Unsupported kind='$kind'. Use: server | frontend | portal | docs"
              exit 1
              ;;
          esac
          if [ "$kind" = "frontend" ] || [ "$kind" = "portal" ] || [ "$kind" = "docs" ]; then
            if [ -z "$QUALITY_CMD" ]; then
              echo "quality_command is required when kind=$kind"
              exit 1
            fi
          fi

  unit-tests:
    if: inputs.kind == 'server'
    needs: validate
    name: ${{ inputs.ref != '' && format('Unit tests ({0})', inputs.ref) || 'Unit tests' }}
    runs-on: ubuntu-latest
    container:
      image: lzk90s/java-develop-env:maven3-openjdk17
      volumes:
        - /root/.m2:/root/.m2
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: ${{ env.CHECKOUT_REF }}

      - name: Resolve artifact label
        id: label
        run: |
          label="${{ inputs.ref }}"
          if [ -z "$label" ]; then
            label="${GITHUB_REF_NAME:-}"
            if [ -z "$label" ]; then
              label="$(printf '%s' "$GITHUB_SHA" | cut -c1-7)"
            fi
          fi
          label="$(printf '%s' "$label" | tr '/' '-')"
          echo "value=$label" >>"$GITHUB_OUTPUT"

      - name: Use Maven cache
        uses: actions/cache@v4
        with:
          path: /root/.m2
          key: ${{ runner.os }}-m2-${{ github.job }}-${{ hashFiles('**/pom.xml') }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-m2-
            ${{ runner.os }}-m2

      - name: Init builder env
        run: init_env.sh

      - name: Run unit tests with JaCoCo
        run: cd "$WORKDIR" && mvn -B clean test $MODULES

      - name: Upload JaCoCo reports
        if: always() && !cancelled()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-coverage-${{ steps.label.outputs.value }}-${{ github.run_id }}
          path: |
            ${{ inputs.workdir }}/**/target/site/jacoco/**
            ${{ inputs.workdir }}/**/target/jacoco.exec
          if-no-files-found: warn
          retention-days: 10

      - name: JaCoCo coverage summary
        if: always() && !cancelled()
        working-directory: ${{ inputs.workdir }}
        env:
          ARTIFACT_LABEL: ${{ steps.label.outputs.value }}
        run: |
          python3 <<'PY'
          import csv
          import os
          from pathlib import Path

          nl = chr(10)
          summary = Path(os.environ["GITHUB_STEP_SUMMARY"])
          run_id = os.environ.get("GITHUB_RUN_ID", "")
          label = os.environ.get("ARTIFACT_LABEL", "")
          artifact = "jacoco-coverage-%s-%s" % (label, run_id) if label else ("jacoco-coverage-%s" % run_id)
          lines = [
              "## JaCoCo Coverage",
              "",
              "汇总报告见 Artifact `%s`（完整 `site/jacoco/**` HTML 站点 + `jacoco.exec`）。" % artifact,
              "",
          ]
          csv_files = sorted(Path(".").glob("**/target/site/jacoco/jacoco.csv"))
          if not csv_files:
              lines.append("_未找到 jacoco.csv（可能无测试模块或插件未生效）_")
          else:
              lines.extend([
                  "| Module | Instruction | Branch | Line |",
                  "| --- | ---: | ---: | ---: |",
              ])
              total = [0, 0, 0, 0, 0, 0]

              def pct(covered, missed):
                  denom = covered + missed
                  return "n/a" if denom == 0 else ("%.1f%%" % (100.0 * covered / denom))

              for csv_path in csv_files:
                  parts = csv_path.parts
                  try:
                      idx = parts.index("target")
                      module = parts[idx - 1] if idx > 0 else csv_path.parent.parent.parent.name
                  except ValueError:
                      module = str(csv_path)
                  i_m = i_c = b_m = b_c = l_m = l_c = 0
                  with csv_path.open(newline="", encoding="utf-8") as fh:
                      for row in csv.DictReader(fh):
                          i_m += int(row.get("INSTRUCTION_MISSED") or 0)
                          i_c += int(row.get("INSTRUCTION_COVERED") or 0)
                          b_m += int(row.get("BRANCH_MISSED") or 0)
                          b_c += int(row.get("BRANCH_COVERED") or 0)
                          l_m += int(row.get("LINE_MISSED") or 0)
                          l_c += int(row.get("LINE_COVERED") or 0)
                  lines.append("| `%s` | %s | %s | %s |" % (module, pct(i_c, i_m), pct(b_c, b_m), pct(l_c, l_m)))
                  total[0] += i_m
                  total[1] += i_c
                  total[2] += b_m
                  total[3] += b_c
                  total[4] += l_m
                  total[5] += l_c

              lines.append(
                  "| **TOTAL** | **%s** | **%s** | **%s** |"
                  % (pct(total[1], total[0]), pct(total[3], total[2]), pct(total[5], total[4]))
              )
          with summary.open("a", encoding="utf-8") as out:
              out.write(nl.join(lines) + nl)
          PY

  spotbugs:
    if: inputs.kind == 'server'
    needs: validate
    name: ${{ inputs.ref != '' && format('SpotBugs ({0})', inputs.ref) || 'SpotBugs' }}
    runs-on: ubuntu-latest
    container:
      image: lzk90s/java-develop-env:maven3-openjdk17
      volumes:
        - /root/.m2:/root/.m2
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: ${{ env.CHECKOUT_REF }}

      - name: Resolve artifact label
        id: label
        run: |
          label="${{ inputs.ref }}"
          if [ -z "$label" ]; then
            label="${GITHUB_REF_NAME:-}"
            if [ -z "$label" ]; then
              label="$(printf '%s' "$GITHUB_SHA" | cut -c1-7)"
            fi
          fi
          label="$(printf '%s' "$label" | tr '/' '-')"
          echo "value=$label" >>"$GITHUB_OUTPUT"

      - name: Use Maven cache
        uses: actions/cache@v4
        with:
          path: /root/.m2
          key: ${{ runner.os }}-m2-${{ github.job }}-${{ hashFiles('**/pom.xml') }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-m2-
            ${{ runner.os }}-m2

      - name: Init builder env
        run: init_env.sh

      - name: SpotBugs + FindSecBugs
        run: |
          cd "$WORKDIR"
          mvn -B -DskipTests compile spotbugs:spotbugs $MODULES

      - name: Upload SpotBugs reports
        if: always() && !cancelled()
        uses: actions/upload-artifact@v4
        with:
          name: spotbugs-${{ steps.label.outputs.value }}-${{ github.run_id }}
          path: |
            ${{ inputs.workdir }}/**/target/spotbugsXml.xml
            ${{ inputs.workdir }}/**/target/spotbugs.xml
            ${{ inputs.workdir }}/**/target/site/spotbugs.html
            ${{ inputs.workdir }}/**/target/site/spotbugs/**
            ${{ inputs.workdir }}/**/target/spotbugs/**
          if-no-files-found: warn
          retention-days: 10

      - name: SpotBugs summary
        if: always() && !cancelled()
        working-directory: ${{ inputs.workdir }}
        env:
          ARTIFACT_LABEL: ${{ steps.label.outputs.value }}
        run: |
          python3 <<'PY'
          import os
          import xml.etree.ElementTree as ET
          from collections import Counter
          from pathlib import Path

          nl = chr(10)
          summary = Path(os.environ["GITHUB_STEP_SUMMARY"])
          run_id = os.environ.get("GITHUB_RUN_ID", "")
          label = os.environ.get("ARTIFACT_LABEL", "")
          artifact = "spotbugs-%s-%s" % (label, run_id) if label else ("spotbugs-%s" % run_id)
          lines = [
              "## SpotBugs + FindSecBugs",
              "",
              (
                  "详情见 Artifact `%s`（完整 SpotBugs XML + HTML 站点）。"
                  "默认 `spotbugs.failOnError=false`（只报告）；可用 `-Dspotbugs.failOnError=true` 门禁。"
              )
              % artifact,
              "",
          ]

          def module_name(path):
              parts = path.parts
              try:
                  idx = parts.index("target")
                  return parts[idx - 1] if idx > 0 else str(path)
              except ValueError:
                  return path.parent.name

          reports = []
          for pattern in ("**/target/spotbugsXml.xml", "**/target/spotbugs.xml"):
              reports.extend(Path(".").glob(pattern))
          by_mod = {}
          for p in reports:
              key = (module_name(p), p.parent)
              if key not in by_mod or p.name == "spotbugsXml.xml":
                  by_mod[key] = p
          reports = sorted(by_mod.values(), key=lambda p: str(p))

          if not reports:
              lines.append("_未找到 SpotBugs XML（可能未配置插件、compile 失败或无 class）_")
          else:
              lines.extend([
                  "| Module | Bugs | High | Medium | Low | SECURITY | Top types |",
                  "| --- | ---: | ---: | ---: | ---: | ---: | --- |",
              ])
              total = Counter()
              type_total = Counter()
              for report in reports:
                  try:
                      root = ET.parse(report).getroot()
                  except Exception:
                      continue
                  bugs = list(root.findall("BugInstance"))
                  ranks = Counter()
                  sec = 0
                  types = Counter()
                  for b in bugs:
                      rank = (b.get("priority") or "").strip()
                      if rank == "1":
                          ranks["High"] += 1
                      elif rank == "2":
                          ranks["Medium"] += 1
                      else:
                          ranks["Low"] += 1
                      if (b.get("category") or "") == "SECURITY":
                          sec += 1
                      types[b.get("type") or "?"] += 1
                      type_total[b.get("type") or "?"] += 1
                  n = len(bugs)
                  total["n"] += n
                  total["High"] += ranks["High"]
                  total["Medium"] += ranks["Medium"]
                  total["Low"] += ranks["Low"]
                  total["SECURITY"] += sec
                  top = ", ".join("`%s`×%d" % (t, c) for t, c in types.most_common(3)) or "-"
                  lines.append(
                      "| `%s` | %d | %d | %d | %d | %d | %s |"
                      % (module_name(report), n, ranks["High"], ranks["Medium"], ranks["Low"], sec, top)
                  )
              lines.append(
                  "| **TOTAL** | **%d** | **%d** | **%d** | **%d** | **%d** |  |"
                  % (total["n"], total["High"], total["Medium"], total["Low"], total["SECURITY"])
              )
              if type_total:
                  lines.extend(["", "### Top bug types", "", "| Type | Count |", "| --- | ---: |"])
                  for t, c in type_total.most_common(20):
                      lines.append("| `%s` | %d |" % (t, c))
          with summary.open("a", encoding="utf-8") as out:
              out.write(nl.join(lines) + nl)
          PY


  # ── frontend / portal / docs：Node 质量检查 ──

  node:
    name: ${{ inputs.kind == 'docs' && 'Docs checks' || 'Frontend checks' }}
    if: inputs.kind == 'frontend' || inputs.kind == 'portal' || inputs.kind == 'docs'
    needs: validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.workdir }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: ${{ env.CHECKOUT_REF }}

      - name: Resolve package manager & install
        id: cfg
        working-directory: ${{ github.workspace }}
        run: |
          kind="${{ inputs.kind }}"
          pm="${{ inputs.package_manager }}"
          install="${{ inputs.install_command }}"
          if [ -z "$pm" ]; then
            case "$kind" in
              frontend|portal) pm=pnpm ;;
              docs) pm=npm ;;
            esac
          fi
          if [ -z "$install" ]; then
            case "$pm" in
              pnpm) install="pnpm install --frozen-lockfile" ;;
              npm) install="npm ci" ;;
              none) install="true" ;;
              *)
                echo "Unknown package_manager='$pm'"
                exit 1
                ;;
            esac
          fi
          echo "package_manager=$pm" >>"$GITHUB_OUTPUT"
          echo "install_command=$install" >>"$GITHUB_OUTPUT"
          echo "Resolved package_manager=$pm"
          echo "Resolved install_command=$install"

      - name: Resolve pnpm version
        id: pnpm
        if: steps.cfg.outputs.package_manager == 'pnpm'
        working-directory: ${{ github.workspace }}
        run: |
          ver="${{ inputs.pnpm_version }}"
          pkg="${{ inputs.workdir }}/package.json"
          if [ -z "$ver" ] && [ -f "$pkg" ]; then
            ver="$(node -p "try{const p=require('./${{ inputs.workdir }}/package.json').packageManager||'';const m=/^pnpm@(.+)$/.exec(p);m?m[1]:''}catch(e){''}")"
          fi
          if [ -z "$ver" ]; then
            ver="10"
          fi
          echo "version=$ver" >>"$GITHUB_OUTPUT"

      - name: Setup pnpm
        if: steps.cfg.outputs.package_manager == 'pnpm'
        uses: pnpm/action-setup@v4
        with:
          version: ${{ steps.pnpm.outputs.version }}

      - name: Setup Node.js (pnpm cache)
        if: ${{ steps.cfg.outputs.package_manager == 'pnpm' && inputs.enable_cache }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: pnpm
          cache-dependency-path: |
            ${{ inputs.workdir }}/pnpm-lock.yaml
            ${{ inputs.workdir }}/**/pnpm-lock.yaml

      - name: Setup Node.js (pnpm no cache)
        if: ${{ steps.cfg.outputs.package_manager == 'pnpm' && !inputs.enable_cache }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}

      - name: Setup Node.js (npm cache)
        if: steps.cfg.outputs.package_manager == 'npm'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: npm
          cache-dependency-path: ${{ inputs.workdir }}/package-lock.json

      - name: Setup Node.js (none)
        if: steps.cfg.outputs.package_manager == 'none'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}

      - name: Configure npm registry auth
        if: steps.cfg.outputs.package_manager != 'none'
        env:
          NPM_AUTH_TOKEN: ${{ secrets.NPM_AUTH_TOKEN }}
        run: |
          if [ -z "${NPM_AUTH_TOKEN}" ]; then
            echo "NPM_AUTH_TOKEN not set — using default registry auth (public only)"
            exit 0
          fi
          REGISTRY="${{ inputs.registry_url }}"
          REGISTRY_HOST="${REGISTRY#https://}"
          REGISTRY_HOST="${REGISTRY_HOST%/}"
          {
            echo "registry=${REGISTRY}"
            echo "always-auth=true"
            echo "//${REGISTRY_HOST}/:_authToken=${NPM_AUTH_TOKEN}"
            echo "strict-peer-dependencies=false"
            echo "auto-install-peers=true"
          } >> "$HOME/.npmrc"
          echo "Configured registry=${REGISTRY}"

      - name: Install dependencies
        env:
          INSTALL_CMD: ${{ steps.cfg.outputs.install_command }}
        run: bash -lc "$INSTALL_CMD"

      - name: Run quality checks
        env:
          QUALITY_CMD: ${{ inputs.quality_command }}
        run: bash -lc "$QUALITY_CMD"
