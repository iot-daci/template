# 复制到业务仓 .github/workflows/require-pr-changelog.yml
# 分支保护 / Ruleset 勾「PR Changelog」

name: Require PR Changelog

on:
  pull_request:
    types: [opened, edited, synchronize, reopened, ready_for_review]
    branches:
      - main

concurrency:
  group: require-pr-changelog-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check:
    uses: iot-daci/template/.github/workflows/require-pr-changelog.yml@main
