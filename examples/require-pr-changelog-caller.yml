# 复制到业务仓 .github/workflows/require-pr-changelog.yml
# Ruleset 只勾「PR Changelog」

name: PR Changelog

on:
  pull_request:
    types: [opened, edited, synchronize, reopened, ready_for_review]
    branches:
      - main

concurrency:
  group: pr-changelog-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: PR Changelog
    runs-on: ubuntu-latest
    steps:
      - uses: iot-daci/template/.github/actions/require-pr-changelog@main
