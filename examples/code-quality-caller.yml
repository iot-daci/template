# 示例：业务仓一个 code-quality-check.yml，按域检测后汇总成一个 Code Quality Gate
# 分支保护只勾「Code Quality Gate」

name: Quality Checks

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: code-quality-check-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    outputs:
      need_portal: ${{ steps.set.outputs.need_portal }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: set
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "need_portal=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          if git diff --name-only "$base" "$head" | grep -qE '^(portal-next/|\.github/workflows/code-quality-check\.yml)'; then
            echo "need_portal=true" >> "$GITHUB_OUTPUT"
          else
            echo "need_portal=false" >> "$GITHUB_OUTPUT"
          fi

  quality-portal:
    name: Portal Quality
    needs: changes
    if: needs.changes.outputs.need_portal == 'true'
    uses: iot-daci/template/.github/workflows/code-quality.yml@main
    with:
      kind: portal
      workdir: portal-next
      quality_command: pnpm lint && pnpm check:type
    secrets:
      NPM_AUTH_TOKEN: ${{ secrets.NPM_AUTH_TOKEN }}

  quality-gate:
    name: Code Quality Gate
    needs: [changes, quality-portal]
    if: always() && (github.event_name == 'workflow_dispatch' || github.event.pull_request.draft == false)
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate gate
        run: |
          need="${{ needs.changes.outputs.need_portal }}"
          result="${{ needs.quality-portal.result }}"
          if [ "$need" = "true" ] && [ "$result" != "success" ]; then
            echo "Portal quality failed (result=$result)"
            exit 1
          fi
          echo "Code quality gate pass"
