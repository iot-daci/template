# 示例：业务仓 code-quality-check.yml（目前仅 Java / server）
# 分支保护只勾「Code Quality Gate」

name: Code Quality Checks

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: code-quality-check-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect server changes
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    outputs:
      need_quality: ${{ steps.set.outputs.need_quality }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: set
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "need_quality=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          echo "Diff ${base}...${head}"
          git diff --name-only "${base}...${head}" | tee "$RUNNER_TEMP/changed.txt" || true
          if grep -qE '^server/' "$RUNNER_TEMP/changed.txt"; then
            echo "need_quality=true" >> "$GITHUB_OUTPUT"
          else
            echo "need_quality=false" >> "$GITHUB_OUTPUT"
          fi

  quality:
    name: Server Quality
    needs: changes
    if: needs.changes.outputs.need_quality == 'true'
    uses: iot-daci/template/.github/workflows/code-quality.yml@main
    with:
      kind: server
      workdir: server

  quality-gate:
    name: Code Quality Gate
    needs: [changes, quality]
    if: always() && (github.event_name == 'workflow_dispatch' || github.event.pull_request.draft == false)
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate gate
        run: |
          need="${{ needs.changes.outputs.need_quality }}"
          result="${{ needs.quality.result }}"
          if [ "$need" != "true" ]; then
            echo "No server changes — gate pass"
            exit 0
          fi
          if [ "$result" = "success" ]; then
            exit 0
          fi
          echo "Server quality did not succeed (result=$result)"
          exit 1
