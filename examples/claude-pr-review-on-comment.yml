# PR 评论触发：在 PR 下评论 /review 即开始 Claude 审查
# 复制到业务仓库 .github/workflows/pr-claude-review-on-comment.yml
#
# 可与 pr-claude-review.yml（自动/on dispatch）并存，注意 API 费用

name: PR Claude Review on /review

on:
  issue_comment:
    types: [created]

jobs:
  claude-review:
    if: |
      github.event.issue.pull_request &&
      github.event.comment.user.type != 'Bot' &&
      (
        github.event.comment.body == '/review' ||
        startsWith(github.event.comment.body, '/review ')
      )
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    uses: YOUR_ORG/template/.github/workflows/claude-pr-review.yml@main
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      # ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
    with:
      pr_number: ${{ github.event.issue.number }}
      model: claude-sonnet-4-6
      max_turns: 50
      post_inline_comments: false
      track_progress: true
